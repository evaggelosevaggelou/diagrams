<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Power Consumption Diagram</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .wrapper {
    width: 100%;
    max-width: 820px;
  }

  /* Language toggle */
  .lang-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 16px;
  }

  .lang-btn {
    background: #f0f4ff;
    border: 1.5px solid #3b6fd4;
    color: #3b6fd4;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .lang-btn:hover { background: #3b6fd4; color: #fff; }

  /* Title */
  .chart-title {
    text-align: center;
    font-size: 17px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 6px;
    letter-spacing: -0.2px;
  }
  .chart-sub {
    text-align: center;
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 20px;
  }

  /* Tab row */
  .tabs {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1.5px solid #e5e7eb;
    background: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: #374151;
    transition: all 0.18s;
  }
  .tab:hover { border-color: #3b6fd4; color: #3b6fd4; }
  .tab.active { background: #3b6fd4; color: #fff; border-color: #3b6fd4; }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* PANEL 1: Component bars */
  .comp-list { display: flex; flex-direction: column; gap: 10px; }

  .comp-row {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1.5px solid transparent;
    transition: border-color 0.15s, background 0.15s;
  }
  .comp-row:hover { background: #f0f4ff; border-color: #c7d7f8; }
  .comp-row.selected { background: #eef3ff; border-color: #3b6fd4; }

  .comp-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }

  .comp-label {
    width: 130px;
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;
    color: #1f2937;
  }

  .bar-wrap {
    flex: 1;
    height: 16px;
    background: #f3f4f6;
    border-radius: 8px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 8px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .comp-range {
    width: 68px;
    text-align: right;
    font-size: 12px;
    color: #6b7280;
    font-weight: 500;
    flex-shrink: 0;
  }

  /* Detail card */
  .detail-card {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 10px;
    background: #f8faff;
    border: 1.5px solid #c7d7f8;
    font-size: 13px;
    color: #374151;
    line-height: 1.6;
    min-height: 56px;
    transition: opacity 0.2s;
  }
  .detail-card strong { color: #1a1a2e; }

  /* PANEL 2: Scenario meter */
  .scenario-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }

  .scenario-card {
    padding: 12px 10px;
    border-radius: 10px;
    border: 2px solid #e5e7eb;
    background: #fff;
    text-align: center;
    cursor: pointer;
    transition: all 0.18s;
  }
  .scenario-card:hover { border-color: #3b6fd4; transform: translateY(-2px); }
  .scenario-card.active { border-color: #3b6fd4; background: #eef3ff; }

  .sc-icon { font-size: 24px; margin-bottom: 4px; }
  .sc-name { font-size: 11px; font-weight: 700; color: #374151; margin-bottom: 2px; }
  .sc-watts { font-size: 18px; font-weight: 800; color: #3b6fd4; }
  .sc-unit { font-size: 10px; color: #9ca3af; }

  .meter-section { margin-top: 4px; }
  .meter-label { font-size: 12px; color: #6b7280; margin-bottom: 8px; text-align: center; }

  .meter-bar-wrap {
    height: 22px;
    background: linear-gradient(to right, #d1fae5 0%, #fef9c3 40%, #fee2e2 75%, #fecaca 100%);
    border-radius: 11px;
    position: relative;
    margin-bottom: 6px;
  }
  .meter-needle {
    position: absolute;
    top: -4px;
    width: 4px;
    height: 30px;
    background: #1a1a2e;
    border-radius: 2px;
    transform: translateX(-50%);
    transition: left 0.6s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  .meter-ticks {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #9ca3af;
    padding: 0 2px;
  }

  .cost-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .cost-card {
    flex: 1;
    min-width: 110px;
    padding: 12px;
    border-radius: 10px;
    background: #f8faff;
    border: 1.5px solid #e5e7eb;
    text-align: center;
  }
  .cost-label { font-size: 11px; color: #9ca3af; margin-bottom: 4px; }
  .cost-value { font-size: 20px; font-weight: 800; color: #1a1a2e; }
  .cost-unit { font-size: 11px; color: #6b7280; }

  /* PANEL 3: Saving tips */
  .tips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
  }

  .tip-card {
    padding: 14px;
    border-radius: 10px;
    border: 1.5px solid #e5e7eb;
    background: #fff;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }
  .tip-card:hover { border-color: #3b6fd4; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59,111,212,0.1); }
  .tip-card.expanded { border-color: #3b6fd4; background: #f8faff; }

  .tip-header { display: flex; align-items: center; gap: 10px; margin-bottom: 0; }
  .tip-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .tip-title { font-size: 13px; font-weight: 700; color: #1f2937; }
  .tip-saving {
    font-size: 11px;
    font-weight: 600;
    color: #059669;
    margin-top: 2px;
  }

  .tip-body {
    display: none;
    margin-top: 10px;
    font-size: 12px;
    color: #4b5563;
    line-height: 1.6;
    border-top: 1px solid #e5e7eb;
    padding-top: 10px;
  }
  .tip-card.expanded .tip-body { display: block; }

  .expand-arrow {
    position: absolute;
    top: 14px; right: 14px;
    font-size: 11px;
    color: #9ca3af;
    transition: transform 0.2s;
  }
  .tip-card.expanded .expand-arrow { transform: rotate(180deg); }

  /* Legend small */
  .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; color: #6b7280; margin-top: 14px; justify-content: center; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="lang-bar">
    <button class="lang-btn" onclick="toggleLang()">🌐 <span id="lang-label">English</span></button>
  </div>

  <div class="chart-title" id="t-title">⚡ Κατανάλωση Ρεύματος Υπολογιστή</div>
  <div class="chart-sub" id="t-sub">Κάνε κλικ στα στοιχεία για περισσότερες πληροφορίες</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab(0)" id="tab0">🔧 Εξαρτήματα</button>
    <button class="tab" onclick="switchTab(1)" id="tab1">📊 Σενάρια Χρήσης</button>
    <button class="tab" onclick="switchTab(2)" id="tab2">🌱 Εξοικονόμηση</button>
  </div>

  <!-- PANEL 1: Components -->
  <div class="panel active" id="panel0">
    <div class="comp-list" id="comp-list"></div>
    <div class="detail-card" id="detail-card">
      <span id="detail-text" style="color:#9ca3af" data-el="detail-hint">← Κάνε κλικ σε ένα εξάρτημα για λεπτομέρειες</span>
    </div>
  </div>

  <!-- PANEL 2: Scenarios -->
  <div class="panel" id="panel1">
    <div class="scenario-grid" id="scenario-grid"></div>
    <div class="meter-section">
      <div class="meter-label" id="meter-label">Επιλέξτε σενάριο χρήσης</div>
      <div class="meter-bar-wrap">
        <div class="meter-needle" id="meter-needle" style="left:5%"></div>
      </div>
      <div class="meter-ticks">
        <span>0W</span><span>100W</span><span>200W</span><span>300W</span><span>400W</span><span>500W</span>
      </div>
    </div>
    <div class="cost-row" id="cost-row"></div>
  </div>

  <!-- PANEL 3: Saving tips -->
  <div class="panel" id="panel2">
    <div class="tips-grid" id="tips-grid"></div>
  </div>

</div>

<script>
let lang = 'el';

const data = {
  components: [
    {
      icon: '🎮', color: '#fee2e2', barColor: '#ef4444',
      label: { el: 'Κάρτα Γραφικών', en: 'Graphics Card' },
      range: '100–350W', pct: 90,
      detail: {
        el: '<strong>Κάρτα Γραφικών (GPU)</strong> — Η μεγαλύτερη κατανάλωση στο σύστημα. Σε gaming μπορεί να φτάσει τα 350W. Περιορισμός FPS μειώνει σημαντικά την κατανάλωση.',
        en: '<strong>Graphics Card (GPU)</strong> — The biggest power draw in any gaming system. Can reach 350W under load. Capping FPS significantly reduces consumption.'
      }
    },
    {
      icon: '🧠', color: '#fef3c7', barColor: '#f59e0b',
      label: { el: 'Επεξεργαστής', en: 'Processor (CPU)' },
      range: '65–250W', pct: 62,
      detail: {
        el: '<strong>Επεξεργαστής (CPU)</strong> — Αυξάνεται δραματικά σε βαριές εργασίες rendering ή compiling. Το undervolting μπορεί να εξοικονομήσει 20–40W χωρίς απώλεια επιδόσεων.',
        en: '<strong>Processor (CPU)</strong> — Spikes dramatically during rendering or compiling. Undervolting can save 20–40W with no performance loss.'
      }
    },
    {
      icon: '🖥️', color: '#ede9fe', barColor: '#8b5cf6',
      label: { el: 'Μητρική Πλακέτα', en: 'Motherboard' },
      range: '40–80W', pct: 18,
      detail: {
        el: '<strong>Μητρική Πλακέτα</strong> — Σχετικά σταθερή κατανάλωση. Τα υψηλής απόδοσης μοντέλα (Z-series) καταναλώνουν περισσότερο λόγω επιπλέον VRM φάσεων.',
        en: '<strong>Motherboard</strong> — Relatively stable consumption. High-end models (Z-series) draw more due to extra VRM phases.'
      }
    },
    {
      icon: '💾', color: '#d1fae5', barColor: '#10b981',
      label: { el: 'Μνήμη RAM', en: 'RAM' },
      range: '3–5W / module', pct: 8,
      detail: {
        el: '<strong>Μνήμη RAM</strong> — Πολύ χαμηλή κατανάλωση ανά module. Με 4 × 8GB DDR5, η συνολική κατανάλωση RAM φτάνει περίπου 16–20W.',
        en: '<strong>RAM</strong> — Very low consumption per module. With 4 × 8GB DDR5, total RAM draw reaches roughly 16–20W.'
      }
    },
    {
      icon: '💿', color: '#e0f2fe', barColor: '#0ea5e9',
      label: { el: 'Αποθηκευτικά', en: 'Storage' },
      range: '3–10W', pct: 10,
      detail: {
        el: '<strong>Αποθηκευτικά (SSD/HDD)</strong> — Οι μηχανικοί δίσκοι HDD καταναλώνουν 7–10W, οι SSD μόλις 3–5W. Η αντικατάσταση HDD με SSD μειώνει κατανάλωση και αυξάνει ταχύτητα.',
        en: '<strong>Storage (SSD/HDD)</strong> — Mechanical HDDs draw 7–10W, SSDs only 3–5W. Replacing HDD with SSD cuts power and boosts speed.'
      }
    },
    {
      icon: '🌀', color: '#f3f4f6', barColor: '#6b7280',
      label: { el: 'Ανεμιστήρες / Ψύξη', en: 'Fans / Cooling' },
      range: '5–30W', pct: 12,
      detail: {
        el: '<strong>Ανεμιστήρες / Ψύξη</strong> — Κάθε ανεμιστήρας καταναλώνει 2–5W. Η συντήρηση (καθαρισμός σκόνης) βελτιώνει ψύξη και μειώνει κατανάλωση.',
        en: '<strong>Fans / Cooling</strong> — Each fan draws 2–5W. Regular maintenance (cleaning dust) improves airflow and reduces consumption.'
      }
    },
  ],

  scenarios: [
    { icon: '😴', watts: 55,  label: { el: 'Αδράνεια', en: 'Idle' } },
    { icon: '🌐', watts: 100, label: { el: 'Πλοήγηση', en: 'Browsing' } },
    { icon: '📺', watts: 120, label: { el: 'Βίντεο HD', en: 'HD Video' } },
    { icon: '🎞️', watts: 420, label: { el: 'Rendering', en: 'Rendering' } },
    { icon: '🎮', watts: 380, label: { el: 'Gaming', en: 'Gaming' } },
    { icon: '📡', watts: 450, label: { el: 'Streaming', en: 'Streaming' } },
  ],

  tips: [
    {
      icon: '⚙️', bg: '#ede9fe',
      title: { el: 'Πλάνο Ενέργειας', en: 'Power Plan' },
      saving: { el: '10–20W εξοικονόμηση', en: '10–20W savings' },
      body: {
        el: 'Άλλαξε από "Υψηλές Επιδόσεις" σε "Εξοικονόμηση Ενέργειας" στις Ρυθμίσεις Windows → Σύστημα → Ενέργεια.',
        en: 'Switch from "High Performance" to "Power Saver" in Windows Settings → System → Power.'
      }
    },
    {
      icon: '🌑', bg: '#fef3c7',
      title: { el: 'Dark Mode + Φωτεινότητα', en: 'Dark Mode + Brightness' },
      saving: { el: '10–30W ανά οθόνη', en: '10–30W per screen' },
      body: {
        el: 'Μείωσε φωτεινότητα στο 70–80% και ενεργοποίησε Dark Mode. Κάθε οθόνη στο μέγιστο καταναλώνει 30W περισσότερο.',
        en: 'Reduce brightness to 70–80% and enable Dark Mode. Each screen at max brightness draws 30W more.'
      }
    },
    {
      icon: '🔒', bg: '#d1fae5',
      title: { el: 'Sleep Mode', en: 'Sleep Mode' },
      saving: { el: '50–100W εξοικονόμηση', en: '50–100W savings' },
      body: {
        el: 'Ρύθμισε αυτόματο Sleep σε 10–15 λεπτά αδράνειας. Το Sleep καταναλώνει μόλις 1–3W έναντι 60–100W ανοιχτού.',
        en: 'Set automatic Sleep after 10–15 minutes of inactivity. Sleep uses just 1–3W vs 60–100W when on.'
      }
    },
    {
      icon: '💽', bg: '#e0f2fe',
      title: { el: 'Αναβάθμιση σε SSD', en: 'Upgrade to SSD' },
      saving: { el: '5–7W εξοικονόμηση', en: '5–7W savings' },
      body: {
        el: 'Αντικατάσταση μηχανικού δίσκου (HDD) με SSD εξοικονομεί 5–7W και βελτιώνει αισθητά την ταχύτητα. Κόστος από 40€.',
        en: 'Replacing a mechanical HDD with an SSD saves 5–7W and noticeably improves speed. Costs from €40.'
      }
    },
    {
      icon: '🧹', bg: '#fee2e2',
      title: { el: 'Καθαρισμός Σκόνης', en: 'Dust Cleaning' },
      saving: { el: '10–20W εξοικονόμηση', en: '10–20W savings' },
      body: {
        el: 'Καθάρισε το κουτί κάθε 3–6 μήνες. Η συσσωρευμένη σκόνη αυξάνει θερμοκρασία, ανεβάζει στροφές ανεμιστήρων και κατανάλωση.',
        en: 'Clean the case every 3–6 months. Dust buildup raises temperatures, spins fans faster, and increases power draw.'
      }
    },
    {
      icon: '🎯', bg: '#f0fdf4',
      title: { el: 'Όριο FPS στο Gaming', en: 'FPS Cap in Gaming' },
      saving: { el: '50–150W εξοικονόμηση', en: '50–150W savings' },
      body: {
        el: 'Ορισμός ορίου 60 ή 120 FPS αντί για unlimited. Μειώνει κατανάλωση GPU έως και 150W χωρίς ουσιαστική απώλεια εμπειρίας.',
        en: 'Set a cap of 60 or 120 FPS instead of unlimited. Reduces GPU draw by up to 150W with minimal experience loss.'
      }
    },
  ]
};

// State
let selectedComp = null;
let selectedScenario = null;

function render() {
  // Tabs
  ['tab0','tab1','tab2'].forEach((id,i) => {
    document.getElementById(id).textContent = [
      lang==='el'?'🔧 Εξαρτήματα':'🔧 Components',
      lang==='el'?'📊 Σενάρια Χρήσης':'📊 Usage Scenarios',
      lang==='el'?'🌱 Εξοικονόμηση':'🌱 Energy Saving'
    ][i];
  });

  document.getElementById('t-title').textContent = lang==='el' ? '⚡ Κατανάλωση Ρεύματος Υπολογιστή' : '⚡ Computer Power Consumption';
  document.getElementById('t-sub').textContent = lang==='el' ? 'Κάνε κλικ στα στοιχεία για περισσότερες πληροφορίες' : 'Click elements for more details';

  renderComponents();
  renderScenarios();
  renderTips();
  updateDetail();
  updateScenarioDisplay();
}

function renderComponents() {
  const list = document.getElementById('comp-list');
  list.innerHTML = data.components.map((c,i) => `
    <div class="comp-row${selectedComp===i?' selected':''}" onclick="selectComp(${i})">
      <div class="comp-icon" style="background:${c.color}">${c.icon}</div>
      <div class="comp-label">${c.label[lang]}</div>
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${c.pct}%;background:${c.barColor}"></div>
      </div>
      <div class="comp-range">${c.range}</div>
    </div>
  `).join('');
}

function renderScenarios() {
  const grid = document.getElementById('scenario-grid');
  grid.innerHTML = data.scenarios.map((s,i) => `
    <div class="scenario-card${selectedScenario===i?' active':''}" onclick="selectScenario(${i})">
      <div class="sc-icon">${s.icon}</div>
      <div class="sc-name">${s.label[lang]}</div>
      <div class="sc-watts">${s.watts}</div>
      <div class="sc-unit">Watt</div>
    </div>
  `).join('');
}

function renderTips() {
  const grid = document.getElementById('tips-grid');
  grid.innerHTML = data.tips.map((t,i) => `
    <div class="tip-card" id="tip${i}" onclick="toggleTip(${i})">
      <span class="expand-arrow">▼</span>
      <div class="tip-header">
        <div class="tip-icon" style="background:${t.bg}">${t.icon}</div>
        <div>
          <div class="tip-title">${t.title[lang]}</div>
          <div class="tip-saving">${t.saving[lang]}</div>
        </div>
      </div>
      <div class="tip-body" id="tip-body-${i}">${t.body[lang]}</div>
    </div>
  `).join('');
}

function selectComp(i) {
  selectedComp = (selectedComp === i) ? null : i;
  renderComponents();
  updateDetail();
}

function updateDetail() {
  const card = document.getElementById('detail-card');
  const text = document.getElementById('detail-text');
  if (selectedComp === null) {
    text.innerHTML = `<span style="color:#9ca3af">${lang==='el'?'← Κάνε κλικ σε ένα εξάρτημα για λεπτομέρειες':'← Click a component for details'}</span>`;
  } else {
    text.innerHTML = data.components[selectedComp].detail[lang];
  }
}

function selectScenario(i) {
  selectedScenario = (selectedScenario === i) ? null : i;
  renderScenarios();
  updateScenarioDisplay();
}

function updateScenarioDisplay() {
  const needle = document.getElementById('meter-needle');
  const label = document.getElementById('meter-label');
  const costRow = document.getElementById('cost-row');
  const MAX_W = 500;

  if (selectedScenario === null) {
    needle.style.left = '2%';
    label.textContent = lang==='el' ? 'Επίλεξε σενάριο χρήσης' : 'Select a usage scenario';
    costRow.innerHTML = '';
    return;
  }

  const s = data.scenarios[selectedScenario];
  const pct = Math.min((s.watts / MAX_W) * 100, 98);
  needle.style.left = pct + '%';
  label.textContent = lang==='el'
    ? `${s.label.el}: ${s.watts}W — ${getCategory(s.watts, 'el')}`
    : `${s.label.en}: ${s.watts}W — ${getCategory(s.watts, 'en')}`;

  const daily = (s.watts / 1000) * 6 * 0.18;
  const monthly = daily * 30;
  const yearly = daily * 365;

  costRow.innerHTML = `
    <div class="cost-card">
      <div class="cost-label">${lang==='el'?'Ανά Ημέρα (6ώρ)':'Per Day (6hrs)'}</div>
      <div class="cost-value">${daily.toFixed(2)}€</div>
    </div>
    <div class="cost-card">
      <div class="cost-label">${lang==='el'?'Ανά Μήνα':'Per Month'}</div>
      <div class="cost-value">${monthly.toFixed(1)}€</div>
    </div>
    <div class="cost-card">
      <div class="cost-label">${lang==='el'?'Ανά Έτος':'Per Year'}</div>
      <div class="cost-value">${Math.round(yearly)}€</div>
      <div class="cost-unit">${lang==='el'?'εκτίμηση @0.18€/kWh':'estimate @€0.18/kWh'}</div>
    </div>
  `;
}

function getCategory(w, l) {
  if (w < 80)  return l==='el' ? '🟢 Χαμηλή κατανάλωση' : '🟢 Low consumption';
  if (w < 200) return l==='el' ? '🟡 Μέτρια κατανάλωση' : '🟡 Moderate consumption';
  if (w < 350) return l==='el' ? '🟠 Υψηλή κατανάλωση' : '🟠 High consumption';
  return l==='el' ? '🔴 Πολύ υψηλή κατανάλωση' : '🔴 Very high consumption';
}

function toggleTip(i) {
  const card = document.getElementById('tip' + i);
  card.classList.toggle('expanded');
}

function switchTab(n) {
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===n));
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
}

function toggleLang() {
  lang = lang === 'el' ? 'en' : 'el';
  document.getElementById('lang-label').textContent = lang === 'el' ? 'English' : 'Ελληνικά';
  render();
}

// Init
render();

// Animate bars on load
setTimeout(() => {
  document.querySelectorAll('.bar-fill').forEach(b => {
    const target = b.style.width;
    b.style.width = '0%';
    requestAnimationFrame(() => { b.style.width = target; });
  });
}, 100);
</script>
</body>
</html>
