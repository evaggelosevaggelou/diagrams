var lang='el', connected=false;
var tx={

    whoTitle:'Ιδανικό για:',
    who1:'Χώρους με πολύ θόρυβο', who2:'Άτομα με ήπια προβλήματα ακοής',
    who3:'Παρακολούθηση με χαμηλή ένταση',
    howTitle:'Πώς να το ανοίξετε:',
    how1:'Ρυθμίσεις → Προσβασιμότητα',
    how2:'Επιλέξτε Sound Amplifier',
    how3:'Συνδέστε ακουστικά → Ρυθμίστε',
    how4:'Διαθέσιμο Android 6+ με Google Play',
    stepTitle:'Sound Amplifier — Ενίσχυση ήχου με ακουστικά',
    step1:'Ενισχύει φωνές, μειώνει θόρυβο, ισοσταθμιστής ανά αυτί — ιδανικό για χώρους με πολύ θόρυβο',
    slLeft:'Αριστερό αυτί (dB)', slRight:'Δεξί αυτί (dB)', slNoise:'Μείωση θορύβου',
    btnConnect:'Σύνδεση ακουστικών!', btnReset:'Reset'
  },
  en:{
    status:'Sound Amplifier', appTitle:'Sound Amplifier', appSub:'Google',
    headphone:'Connect headphones to start', connectedTxt:'Headphones connected',
    left:'Left', right:'Right',
    noiseRed:'Noise reduction', noiseRed2:'Environmental noise',
    eq:'Equalizer',
    before:'Without Sound Amplifier', noisy:'Noisy, irregular',
    process:'Processing',
    after:'With Sound Amplifier', clean:'Clean, amplified',
    required:'Headphones required',
    rpTitle:'What it does:',
    feat1:'Amplifies sounds', feat1b:'Makes voices louder and clearer',
    feat2:'Reduces noise', feat2b:'Filters out environmental noise',
    feat3:'Independent adjustment', feat3b:'Left and right ear separately',
    feat4:'Equalizer', feat4b:'Frequency adjustment per ear',
    whoTitle:'Ideal for:',
    who1:'Noisy environments', who2:'People with mild hearing difficulties',
    who3:'Listening at low volume',
    howTitle:'How to open it:',
    how1:'Settings → Accessibility',

function connectHeadphones(){
  connected=true;
  document.getElementById('lbl-headphone').setAttribute('opacity','0');
  document.getElementById('connected-bar').setAttribute('opacity','1');
  document.getElementById('lbl-connected').setAttribute('opacity','1');
  document.getElementById('btn-connect').textContent=(lang==='el')?'Συνδεδεμένα!':'Connected!';
  document.getElementById('btn-connect').disabled=true;
}

function updateLeft(v){
  document.getElementById('lbl-left-val').textContent=v+' dB';
  document.getElementById('sl-left-val').textContent=v+' dB';
  var col=v>10?'#E24B4A':v>5?'#EF9F27':'#378ADD';
  document.getElementById('lbl-left-val').setAttribute('fill',col);
  animEQ(parseInt(v));
}

function updateRight(v){
  document.getElementById('lbl-right-val').textContent=v+' dB';
  document.getElementById('sl-right-val').textContent=v+' dB';
  var col=v>10?'#E24B4A':v>5?'#EF9F27':'#378ADD';
  document.getElementById('lbl-right-val').setAttribute('fill',col);
  animEQ(parseInt(v));
}

function updateNoise(v){
  document.getElementById('sl-noise-val').textContent=v+'%';
  var on=parseInt(v)>50;
  document.getElementById('noise-toggle-bg').setAttribute('fill',on?'#1D9E75':'#333340');
  document.getElementById('noise-toggle-dot').setAttribute('cx',on?'202':'194');
  document.getElementById('noise-toggle-dot').setAttribute('fill',on?'#fff':'#5F5E5A');
  // Animate clean wave opacity based on noise reduction
  var wave=document.getElementById('clean-wave');
  wave.setAttribute('opacity', 0.4 + (parseInt(v)/100)*0.6);
}

function animEQ(boost){
  var bars=document.querySelectorAll('#eq-bars rect');
  var base=[14,24,29,26,19,14,16];
  bars.forEach(function(bar,i){
    var newH=Math.min(50, base[i] + Math.round(boost*1.5));
    var newY=334 - newH;
    bar.setAttribute('height', newH);
    bar.setAttribute('y', newY);
    bar.setAttribute('fill', boost>10?'#E24B4A':boost>5?'#EF9F27':'#378ADD');
  });
}

function resetDemo(){
  connected=false;
  document.getElementById('lbl-headphone').setAttribute('opacity','1');
  document.getElementById('connected-bar').setAttribute('opacity','0');
  document.getElementById('lbl-connected').setAttribute('opacity','0');
  document.getElementById('btn-connect').textContent=tx[lang].btnConnect;
  document.getElementById('btn-connect').disabled=false;
  document.getElementById('sl-left').value=0;
  document.getElementById('sl-right').value=0;
  document.getElementById('sl-noise').value=0;
  document.getElementById('sl-left-val').textContent='0 dB';
  document.getElementById('sl-right-val').textContent='0 dB';
  document.getElementById('sl-noise-val').textContent='0%';
  document.getElementById('lbl-left-val').textContent='0';
  document.getElementById('lbl-right-val').textContent='0';
  document.getElementById('lbl-left-val').setAttribute('fill','#378ADD');
  document.getElementById('lbl-right-val').setAttribute('fill','#378ADD');
  document.getElementById('noise-toggle-bg').setAttribute('fill','#333340');
  document.getElementById('noise-toggle-dot').setAttribute('cx','194');
  document.getElementById('noise-toggle-dot').setAttribute('fill','#5F5E5A');
  document.getElementById('clean-wave').setAttribute('opacity','1');
  animEQ(0);
}

setLang('el');
</script>
