      border-radius: 30px;
      padding: 8px 20px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .lang-btn:hover { background: #1557b0; transform: translateY(-1px); }

    /* ── HERO ── */
    .hero {
      width: 100%;
      max-width: 780px;
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      border-radius: 18px;
      padding: 36px 32px 32px;
      color: #fff;
      text-align: center;
      margin-bottom: 28px;
      box-shadow: 0 8px 32px rgba(26,115,232,0.22);
    }
    .hero-icon { font-size: 2.8rem; margin-bottom: 10px; }
    .hero h1 { font-size: 1.65rem; font-weight: 800; margin-bottom: 10px; line-height: 1.25; }
    .hero p { font-size: 0.98rem; opacity: 0.88; max-width: 520px; margin: 0 auto; line-height: 1.6; }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #1a73e8;
      margin: 28px 0 10px;
    }

    /* ── CARD GRID (volumes) ── */

      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 8px;
    }
    .card {
      background: #f8f9fc;
      border: 2px solid #e3e8ef;
      border-radius: 14px;
      padding: 18px 16px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      user-select: none;
    }

    .card.active { border-color: #1a73e8; background: #e8f0fe; box-shadow: 0 4px 18px rgba(26,115,232,0.18); }
    .card-icon { font-size: 1.7rem; margin-bottom: 8px; }
    .card-title { font-weight: 700; font-size: 0.97rem; color: #1e2532; margin-bottom: 4px; }
    .card-subtitle { font-size: 0.8rem; color: #5f6b7a; }

      background: #fff;
      border: 2px solid #1a73e8;
      border-radius: 14px;
      padding: 22px 20px;
      margin-top: 12px;
      animation: fadeIn 0.22s ease;

    .detail-panel .badge {
      display: inline-block;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      margin: 2px 3px 2px 0;
    }
    .badge.green { background: #d4edda; color: #155724; }
    .badge.red { background: #f8d7da; color: #721c24; }
    .badge.yellow { background: #fff3cd; color: #856404; }

    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }

    /* ── COMPARISON TOGGLE ── */
    .compare-section { margin-top: 8px; }
    .compare-header {
      display: flex;
      gap: 0;
      background: #f0f4f8;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 14px;
    }
    .compare-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      color: #5f6b7a;
      transition: all 0.2s;
      border: none;
      background: transparent;
    }
    .compare-tab.active { background: #1a73e8; color: #fff; box-shadow: 0 2px 8px rgba(26,115,232,0.2); }

    .compare-panel { display: none; }
    .compare-panel.active { display: block; animation: fadeIn 0.2s ease; }

    .compare-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid #eef0f3;
      font-size: 0.9rem;

      border: 2px solid #e3e8ef;
      border-radius: 14px;
      padding: 22px 20px;

    .quiz-options { display: flex; flex-direction: column; gap: 9px; }
    .quiz-option {
      background: #fff;
      border: 2px solid #e3e8ef;
      border-radius: 10px;
      padding: 11px 14px;
      cursor: pointer;
      font-size: 0.93rem;
      transition: all 0.18s;
      text-align: left;
      color: #1e2532;

    .quiz-option.wrong { border-color: #dc3545; background: #f8d7da; color: #721c24; }
    .quiz-option:disabled { cursor: default; }
    .quiz-result { margin-top: 14px; padding: 12px 14px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; display: none; }
    .quiz-result.show { display: block; animation: fadeIn 0.2s ease; }
    .quiz-result.ok { background: #d4edda; color: #155724; }
    .quiz-result.nope { background: #f8d7da; color: #721c24; }
    .quiz-next {
      margin-top: 12px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 22px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      display: none;
    }
    .quiz-next.show { display: inline-block; }
    .quiz-score { font-size: 0.8rem; color: #5f6b7a; margin-top: 6px; }

      font-size: 0.78rem;
      color: #aab0ba;
      text-align: center;

    @media (max-width: 480px) {
      .hero { padding: 28px 18px 24px; }
      .hero h1 { font-size: 1.3rem; }
      .compare-row .label { flex: 0 0 110px; }
      .cards-grid { grid-template-columns: 1fr 1fr; }
    }

      { label: "Ease of use", basic: "Moderate", dynamic: "✅ Very easy", icon: "😊" },
      { label: "RAID features", basic: "✅ Yes", dynamic: "✅ Yes (more)", icon: "⚙️" },
      { label: "Microsoft support", basic: "⚠️ Legacy", dynamic: "✅ Active", icon: "🏢" },
      { label: "Works with USB drives", basic: "❌", dynamic: "✅ Yes", icon: "🔌" },
      { label: "Recommended for new users", basic: "❌", dynamic: "✅ Yes", icon: "🌱" }
    ],

    quiz: [
      {
        q: "How many primary partitions can a basic MBR disk have?",
        opts: ["2", "4", "8", "Unlimited"],
        ans: 1,
        exp: "A basic MBR disk supports up to 4 primary partitions."
      },
      {
        q: "Which volume type automatically mirrors data to a second disk?",
        opts: ["Spanned Volume", "Striped Volume (RAID 0)", "Mirrored Volume (RAID 1)", "Simple Volume"],
        ans: 2,
        exp: "Mirrored Volume (RAID 1) automatically copies data to a second disk."
      },
      {
        q: "Are dynamic disks recognized by Mac or Linux?",
        opts: ["Yes, always", "Only on Mac", "No — Windows only", "Only with a special driver"],
        ans: 2,
        exp: "Dynamic disks use Microsoft's LDM technology — they are not recognized by Mac or Linux."
      },
      {
        q: "Which volume type gives maximum speed but zero data safety?",
        opts: ["Simple Volume", "RAID 1", "Spanned Volume", "RAID 0 (Striped)"],
        ans: 3,
        exp: "Striped Volume (RAID 0) spreads data across disks for maximum speed — with no redundancy."
      },
      {
        q: "What happens to your data when converting a basic disk TO a dynamic disk?",
        opts: ["Data is deleted immediately", "Data is preserved — nothing is lost", "Files move to Cloud automatically", "A format is required"],
        ans: 1,
        exp: "Converting from basic TO dynamic does NOT delete data. The reverse process requires deleting all volumes."
      },
      {
        q: "RAID-5 volumes on Windows dynamic disks are available on:",
        opts: ["Windows 10 Home", "Windows 10 Pro", "Windows 11", "Windows Server only"],
        ans: 3,
        exp: "RAID-5 volume is available exclusively on Windows Server — not supported on Windows 10/11."
      }
    ]
  }
};

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let lang = 'el';
let activeCard = null;
let activeTab = 'basic';
let qIdx = 0, correct = 0, answered = false;

// ═══════════════════════════════════════════════════════════
//  LANG TOGGLE
// ═══════════════════════════════════════════════════════════
function toggleLang() {
  lang = lang === 'el' ? 'en' : 'el';
  document.documentElement.lang = lang;
  activeCard = null;
  qIdx = 0; correct = 0; answered = false;
  render();
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  const d = data[lang];

  // Hero
  document.getElementById('heroTitle').textContent = d.heroTitle;
  document.getElementById('heroSub').textContent = d.heroSub;

  // Labels
  document.getElementById('label1').textContent = d.label1;
  document.getElementById('label2').textContent = d.label2;
  document.getElementById('label3').textContent = d.label3;

  // Lang btn
  document.getElementById('langBtn').textContent = d.langBtn;

  // Tabs
  document.getElementById('tab1').textContent = d.tab1;
  document.getElementById('tab2').textContent = d.tab2;

  renderVolumes();
  renderCompare();
  renderQuiz();
}

// ── VOLUMES ──
function renderVolumes() {
  const d = data[lang];
  const grid = document.getElementById('volumeGrid');
  grid.innerHTML = '';
  d.volumes.forEach((v, i) => {
    const el = document.createElement('div');
    el.className = 'card' + (activeCard === i ? ' active' : '');
    el.innerHTML = `<div class="card-icon">${v.icon}</div>
      <div class="card-title">${v.title}</div>
      <div class="card-subtitle">${v.subtitle}</div>`;
    el.onclick = () => { activeCard = activeCard === i ? null : i; renderVolumes(); };
    grid.appendChild(el);
  });

  const detail = document.getElementById('volumeDetail');
  if (activeCard !== null) {
    const v = d.volumes[activeCard];
    const tagsHtml = v.tags.map(t => `<span class="badge ${t.cls}">${t.label}</span>`).join('');
    const spd = lang === 'el' ? 'Ταχύτητα' : 'Speed';
    const saf = lang === 'el' ? 'Ασφάλεια' : 'Safety';
    const us = lang === 'el' ? 'Χρήση' : 'Use case';
    detail.style.display = 'block';
    detail.innerHTML = `<div class="detail-panel">
      <h3>${v.icon} ${v.title}</h3>
      <p>${v.desc}</p>
      <p><strong>${spd}:</strong> ${v.speed} &nbsp;|&nbsp; <strong>${saf}:</strong> ${v.safety} &nbsp;|&nbsp; <strong>${us}:</strong> ${v.use}</p>
      <div>${tagsHtml}</div>
    </div>`;
  } else {
    detail.style.display = 'none';
  }
}

// ── COMPARE ──
function showTab(which) {
  activeTab = which;
  ['basic','storage'].forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('active', t === which);
  });
  document.getElementById('tab1').classList.toggle('active', which === 'basic');
  document.getElementById('tab2').classList.toggle('active', which === 'storage');
}

function renderCompare() {
  const d = data[lang];
  const h1 = lang === 'el' ? ['Χαρακτηριστικό','Βασικός','Δυναμικός'] : ['Feature','Basic','Dynamic'];
  const h2 = lang === 'el' ? ['Χαρακτηριστικό','Δυναμικοί Δίσκοι','Storage Spaces'] : ['Feature','Dynamic Disks','Storage Spaces'];

  function buildRows(rows, headers) {
    return `<div style="margin-bottom:4px;display:flex;gap:10px;padding:8px 0;border-bottom:2px solid #e3e8ef;">
      <div style="flex:0 0 160px;font-size:0.82rem;font-weight:700;color:#1a73e8;">${headers[0]}</div>
      <div style="flex:1;font-size:0.82rem;font-weight:700;color:#1a73e8;">${headers[1]}</div>
      <div style="flex:1;font-size:0.82rem;font-weight:700;color:#1a73e8;">${headers[2]}</div>
    </div>` +
    rows.map(r => `<div class="compare-row">
      <div class="icon">${r.icon}</div>
      <div class="label">${r.label}</div>
      <div class="value" style="flex:1">${r.basic}</div>
      <div class="value" style="flex:1">${r.dynamic}</div>
    </div>`).join('');
  }

  document.getElementById('panel-basic').innerHTML = buildRows(d.basicVsDynamic, h1);
  document.getElementById('panel-storage').innerHTML = buildRows(d.dynamicVsStorage, h2);
}

// ── QUIZ ──
function renderQuiz() {
  const d = data[lang];
  const total = d.quiz.length;
  const q = d.quiz[qIdx];

  document.getElementById('quizQ').textContent = `${qIdx + 1}/${total}. ${q.q}`;
  document.getElementById('quizScore').textContent = d.scoreText(correct, total);

  const optsEl = document.getElementById('quizOpts');
  optsEl.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.onclick = () => answer(i);
    optsEl.appendChild(btn);
  });

  const res = document.getElementById('quizResult');
  res.className = 'quiz-result';
  res.textContent = '';

  const nxt = document.getElementById('quizNext');
  nxt.className = 'quiz-next';
  nxt.textContent = qIdx + 1 < total ? d.quizNextBtn : d.quizDoneBtn;
  answered = false;
}

function answer(i) {
  if (answered) return;
  answered = true;
  const d = data[lang];
  const q = d.quiz[qIdx];
  const btns = document.querySelectorAll('.quiz-option');
  btns.forEach(b => b.disabled = true);

  if (i === q.ans) {
    correct++;
    btns[i].classList.add('correct');
    const res = document.getElementById('quizResult');
    res.textContent = d.correctText + ' ' + q.exp;
    res.className = 'quiz-result show ok';
  } else {
    btns[i].classList.add('wrong');
    btns[q.ans].classList.add('correct');
    const res = document.getElementById('quizResult');
    res.textContent = d.wrongText(q.opts[q.ans]) + ' ' + q.exp;
    res.className = 'quiz-result show nope';
  }
  document.getElementById('quizScore').textContent = d.scoreText(correct, d.quiz.length);
  document.getElementById('quizNext').classList.add('show');
}

function nextQ() {
  const total = data[lang].quiz.length;
  if (qIdx + 1 < total) {
    qIdx++;
  } else {
    qIdx = 0; correct = 0;
  }
  renderQuiz();
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
render();
showTab('basic');
</script>
</body>
</html>
