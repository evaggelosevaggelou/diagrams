<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>One-Handed Mode — Android Trick #9</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;padding:1rem}
.lang-controls{display:flex;justify-content:center;gap:8px;margin:0 0 10px}
.lang-controls button{padding:6px 14px;font-size:13px;cursor:pointer;border:1px solid #ccc;border-radius:6px;background:#fff}
.lang-controls button.active{font-weight:700;border-color:#888;background:#f0f0f0}
.action-controls{display:flex;justify-content:center;gap:10px;margin:10px 0 4px;flex-wrap:wrap}
.action-controls button{font-size:13px;padding:6px 18px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer}
.action-controls button:hover{background:#f0f0f0}
</style>
</head>
<body>

<div class="lang-controls">
  <button id="btn-el" class="active" onclick="setLang('el')">Ελληνικά</button>
  <button id="btn-en" onclick="setLang('en')">English</button>
</div>

<svg width="100%" viewBox="0 0 680 500">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- PHONE LEFT: Normal mode -->
<rect x="172" y="50" width="156" height="290" rx="22" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="1.5"/>
<rect x="184" y="72" width="132" height="236" rx="8" fill="#1e2030"/>
<rect x="184" y="72" width="132" height="22" rx="8" fill="#111125"/>
<text id="normal-app-title" x="250" y="86" text-anchor="middle" font-size="9" fill="#9c9a92">Εφαρμογή</text>
<rect x="192" y="100" width="116" height="30" rx="5" fill="#16213e"/>
<rect x="192" y="136" width="60" height="12" rx="3" fill="#222240" opacity=".8"/>
<rect x="192" y="152" width="116" height="12" rx="3" fill="#222240" opacity=".6"/>
<rect x="192" y="168" width="90" height="12" rx="3" fill="#222240" opacity=".4"/>
<rect x="192" y="188" width="50" height="22" rx="6" fill="#378ADD" opacity=".9"/>
<rect x="250" y="188" width="50" height="22" rx="6" fill="#1D9E75" opacity=".9"/>
<text id="normal-btn1" x="217" y="203" text-anchor="middle" font-size="7" fill="#fff">Αποθήκευση</text>
<text id="normal-btn2" x="275" y="203" text-anchor="middle" font-size="7" fill="#fff">Ακύρωση</text>
<rect x="192" y="218" width="116" height="12" rx="3" fill="#222240" opacity=".5"/>
<rect x="192" y="234" width="80" height="12" rx="3" fill="#222240" opacity=".4"/>
<rect x="192" y="250" width="116" height="40" rx="6" fill="#16213e" opacity=".7"/>
<!-- Red zone: hard to reach -->
<rect x="184" y="72" width="132" height="90" rx="8" fill="#E24B4A" opacity=".12"/>
<text id="lbl-cant-reach" x="250" y="120" text-anchor="middle" font-size="8" fill="#E24B4A">Δύσκολο να φτάσετε</text>
<!-- X mark -->
<line x1="224" y1="96" x2="236" y2="108" stroke="#E24B4A" stroke-width="2" stroke-linecap="round"/>
<line x1="236" y1="96" x2="224" y2="108" stroke="#E24B4A" stroke-width="2" stroke-linecap="round"/>
<!-- Hand silhouette left -->
<ellipse cx="240" cy="370" rx="30" ry="18" fill="#B4B2A9" opacity=".7"/>
<rect x="215" y="350" width="50" height="30" rx="15" fill="#B4B2A9" opacity=".6"/>
<ellipse cx="255" cy="335" rx="8" ry="22" fill="#888780" opacity=".7" transform="rotate(-20,255,335)"/>
<rect x="228" y="330" width="44" height="3" rx="1.5" fill="#444441"/>
<text id="lbl-phone-normal" x="250" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#888780">Κανονική λειτουργία</text>
<text id="lbl-phone-normal2" x="250" y="372" text-anchor="middle" font-size="10" fill="#5F5E5A">Δύσκολο με ένα χέρι</text>

<!-- ARROW CENTER -->
<path d="M332 210 L368 210" fill="none" stroke="#7F77DD" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<rect x="322" y="196" width="56" height="18" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text id="lbl-activate" x="350" y="208" text-anchor="middle" font-size="9" fill="#3C3489">One-Hand</text>

<!-- PHONE RIGHT: One-handed mode -->
<rect x="372" y="50" width="156" height="290" rx="22" fill="#2C2C2A" stroke="#1D9E75" stroke-width="2"/>
<rect x="384" y="72" width="132" height="236" rx="8" fill="#1e2030"/>
<!-- Gray inactive zone top -->
<rect x="384" y="72" width="132" height="110" rx="8" fill="#111118"/>
<text id="lbl-inactive" x="450" y="124" text-anchor="middle" font-size="8" fill="#333340">Ανενεργή ζώνη</text>
<!-- Shrunken content at bottom -->
<rect x="384" y="186" width="132" height="18" rx="4" fill="#111125"/>
<text id="small-app-title" x="450" y="198" text-anchor="middle" font-size="8" fill="#9c9a92">Εφαρμογή</text>
<rect x="390" y="208" width="120" height="24" rx="4" fill="#16213e"/>
<rect x="390" y="236" width="60" height="10" rx="3" fill="#222240" opacity=".8"/>
<rect x="390" y="250" width="120" height="10" rx="3" fill="#222240" opacity=".6"/>
<!-- Buttons at bottom (easy reach) -->
<rect x="390" y="264" width="52" height="20" rx="5" fill="#378ADD"/>
<rect x="450" y="264" width="52" height="20" rx="5" fill="#1D9E75"/>
<text id="small-btn1" x="416" y="277" text-anchor="middle" font-size="6.5" fill="#fff">Αποθήκευση</text>
<text id="small-btn2" x="476" y="277" text-anchor="middle" font-size="6.5" fill="#fff">Ακύρωση</text>
<!-- Green zone overlay -->
<rect x="384" y="186" width="132" height="122" rx="4" fill="#1D9E75" opacity=".08" stroke="#1D9E75" stroke-width="0.5"/>
<text id="lbl-can-reach" x="450" y="300" text-anchor="middle" font-size="8" fill="#1D9E75">Εύκολη πρόσβαση</text>
<!-- Gesture hint -->
<path d="M460 315 Q430 315 420 308" fill="none" stroke="#7F77DD" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
<text id="lbl-gesture" x="450" y="325" text-anchor="middle" font-size="8" fill="#7F77DD">Σύρσιμο από κάτω</text>
<!-- Hand silhouette right (thumb reaches easily) -->
<ellipse cx="440" cy="370" rx="30" ry="18" fill="#B4B2A9" opacity=".7"/>
<rect x="415" y="350" width="50" height="30" rx="15" fill="#B4B2A9" opacity=".6"/>
<ellipse cx="455" cy="330" rx="8" ry="20" fill="#1D9E75" opacity=".6" transform="rotate(-15,455,330)"/>
<!-- Checkmark -->
<path d="M430 282 L436 290 L448 274" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="428" y="330" width="44" height="3" rx="1.5" fill="#444441"/>
<text id="lbl-phone-one" x="450" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#1D9E75">One-Handed Mode</text>
<text id="lbl-phone-one2" x="450" y="372" text-anchor="middle" font-size="10" fill="#0F6E56">Εύκολο με ένα χέρι</text>

<!-- STEPS -->
<rect x="30" y="395" width="620" height="90" rx="10" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text id="step-title" x="340" y="415" text-anchor="middle" font-size="11" font-weight="600" fill="#444441">Πώς να ενεργοποιήσετε το One-Handed Mode</text>
<rect x="50" y="425" width="14" height="14" rx="7" fill="#7F77DD"/>
<text x="57" y="436" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">1</text>
<text id="step1" x="72" y="436" font-size="10" fill="#5F5E5A">Ρυθμίσεις → Σύστημα → Χειρονομίες → One-Handed Mode</text>
<rect x="50" y="443" width="14" height="14" rx="7" fill="#7F77DD"/>
<text x="57" y="454" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">2</text>
<text id="step2" x="72" y="454" font-size="10" fill="#5F5E5A">Ενεργοποιήστε και επιλέξτε χειρονομία (π.χ. σύρσιμο από το κάτω μέρος)</text>
<rect x="50" y="461" width="14" height="14" rx="7" fill="#1D9E75"/>
<text x="57" y="472" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">!</text>
<text id="step3" x="72" y="472" font-size="10" fill="#0F6E56">Διαθέσιμο σε Pixel, Samsung (One UI), και πολλά άλλα Android κινητά</text>
<rect x="50" y="479" width="14" height="14" rx="7" fill="#BA7517"/>
<text x="57" y="490" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">+</text>
<text id="step4" x="72" y="490" font-size="10" fill="#854F0B">Πατήστε στη γκρι ζώνη ή επαναλάβετε τη χειρονομία για έξοδο</text>
</svg>

<div class="action-controls">
  <button id="btn-toggle" onclick="toggleMode()">Ενεργοποίηση One-Handed!</button>
  <button id="btn-reset" onclick="resetMode()">Reset</button>
</div>

<script>
var lang='el', modeOn=false;
var tx={
  el:{
    appTitle:'Εφαρμογή',cantReach:'Δύσκολο να φτάσετε',canReach:'Εύκολη πρόσβαση',
    inactive:'Ανενεργή ζώνη',gesture:'Σύρσιμο από κάτω',activate:'One-Hand',
    btn1:'Αποθήκευση',btn2:'Ακύρωση',
    phoneNormal:'Κανονική λειτουργία',phoneNormal2:'Δύσκολο με ένα χέρι',
    phoneOne:'One-Handed Mode',phoneOne2:'Εύκολο με ένα χέρι',
    stepTitle:'Πώς να ενεργοποιήσετε το One-Handed Mode',
    step1:'Ρυθμίσεις → Σύστημα → Χειρονομίες → One-Handed Mode',
    step2:'Ενεργοποιήστε και επιλέξτε χειρονομία (π.χ. σύρσιμο από το κάτω μέρος)',
    step3:'Διαθέσιμο σε Pixel, Samsung (One UI), και πολλά άλλα Android κινητά',
    step4:'Πατήστε στη γκρι ζώνη ή επαναλάβετε τη χειρονομία για έξοδο',
    btnToggle:'Ενεργοποίηση One-Handed!',btnReset:'Reset'
  },
  en:{
    appTitle:'App',cantReach:'Hard to reach',canReach:'Easy to reach',
    inactive:'Inactive zone',gesture:'Swipe from bottom',activate:'One-Hand',
    btn1:'Save',btn2:'Cancel',
    phoneNormal:'Normal mode',phoneNormal2:'Hard with one hand',
    phoneOne:'One-Handed Mode',phoneOne2:'Easy with one hand',
    stepTitle:'How to enable One-Handed Mode',
    step1:'Settings → System → Gestures → One-Handed Mode',
    step2:'Enable and choose a gesture (e.g. swipe from bottom edge)',
    step3:'Available on Pixel, Samsung (One UI), and many other Android devices',
    step4:'Tap the grey zone or repeat the gesture to exit',
    btnToggle:'Enable One-Handed!',btnReset:'Reset'
  }
};

function setLang(l){
  lang=l; var t=tx[l];
  document.getElementById('normal-app-title').textContent=t.appTitle;
  document.getElementById('lbl-cant-reach').textContent=t.cantReach;
  document.getElementById('lbl-can-reach').textContent=t.canReach;
  document.getElementById('lbl-inactive').textContent=t.inactive;
  document.getElementById('lbl-gesture').textContent=t.gesture;
  document.getElementById('lbl-activate').textContent=t.activate;
  document.getElementById('normal-btn1').textContent=t.btn1;
  document.getElementById('normal-btn2').textContent=t.btn2;
  document.getElementById('small-app-title').textContent=t.appTitle;
  document.getElementById('small-btn1').textContent=t.btn1;
  document.getElementById('small-btn2').textContent=t.btn2;
  document.getElementById('lbl-phone-normal').textContent=t.phoneNormal;
  document.getElementById('lbl-phone-normal2').textContent=t.phoneNormal2;
  document.getElementById('lbl-phone-one').textContent=t.phoneOne;
  document.getElementById('lbl-phone-one2').textContent=t.phoneOne2;
  document.getElementById('step-title').textContent=t.stepTitle;
  document.getElementById('step1').textContent=t.step1;
  document.getElementById('step2').textContent=t.step2;
  document.getElementById('step3').textContent=t.step3;
  document.getElementById('step4').textContent=t.step4;
  document.getElementById('btn-toggle').textContent=t.btnToggle;
  document.getElementById('btn-reset').textContent=t.btnReset;
  document.getElementById('btn-el').className=(l==='el')?'active':'';
  document.getElementById('btn-en').className=(l==='en')?'active':'';
}

function toggleMode(){
  modeOn=!modeOn;
  var t=tx[lang];
  if(modeOn){
    document.getElementById('lbl-phone-normal').style.opacity='0.4';
    document.getElementById('lbl-phone-normal2').style.opacity='0.4';
    document.getElementById('lbl-phone-one').style.fontWeight='700';
    document.getElementById('btn-toggle').textContent=(lang==='el')?'Απενεργοποίηση':'Disable';
  } else {
    resetMode();
  }
}

function resetMode(){
  modeOn=false;
  document.getElementById('lbl-phone-normal').style.opacity='1';
  document.getElementById('lbl-phone-normal2').style.opacity='1';
  document.getElementById('lbl-phone-one').style.fontWeight='600';
  document.getElementById('btn-toggle').textContent=tx[lang].btnToggle;
}

setLang('el');
</script>
</body>
</html>
