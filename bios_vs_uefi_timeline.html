<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIOS vs UEFI — Interactive Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bios: #c0392b;
    --uefi: #1a6fc4;
    --bios-light: #fdf2f1;
    --uefi-light: #f0f7ff;
    --neutral: #f5f5f5;
    --text: #1a1a2e;
    --muted: #666;
    --border: #e0e0e0;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --radius: 14px;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: #ffffff;
    color: var(--text);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 32px;
    min-height: 100vh;
  }

  .wrapper {
    width: 100%;
    max-width: 820px;
  }

  /* ── LANG TOGGLE ── */
  .lang-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 18px;
  }

  .lang-btn {
    background: white;
    border: 2px solid var(--border);
    border-radius: 30px;
    padding: 6px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.22s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .lang-btn:hover { border-color: var(--uefi); color: var(--uefi); }

  /* ── HEADER ── */
  .header { text-align: center; margin-bottom: 28px; }
  .header .eyebrow {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    line-height: 1.15;
    color: var(--text);
  }
  .header h1 span.bios-label { color: var(--bios); }
  .header h1 span.uefi-label { color: var(--uefi); }
  .header .subtitle {
    margin-top: 10px;
    font-size: 0.9rem;
    color: var(--muted);
    font-weight: 300;
  }

  /* ── PILLARS ── */
  .pillars {
    display: grid;
    grid-template-columns: 1fr 60px 1fr;
    gap: 0;
    margin-bottom: 24px;
    align-items: start;
  }

  .pillar-head {
    text-align: center;
    padding: 14px 12px 12px;
    border-radius: var(--radius) var(--radius) 0 0;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
  }
  .pillar-head.bios-head { background: var(--bios); color: white; }
  .pillar-head.uefi-head { background: var(--uefi); color: white; }
  .vs-head {
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    color: var(--muted);
  }

  /* ── ROWS ── */
  .rows { display: contents; }

  .row-group {
    display: grid;
    grid-template-columns: 1fr 60px 1fr;
    margin-bottom: 6px;
    cursor: pointer;
  }
  .row-group:last-child { margin-bottom: 0; }

  .cell {
    padding: 13px 16px;
    font-size: 0.87rem;
    line-height: 1.45;
    transition: background 0.18s;
    border: 1px solid var(--border);
    background: white;
  }
  .cell.bios-cell {
    border-radius: 0 0 0 0;
    border-right: none;
  }
  .cell.uefi-cell {
    border-radius: 0 0 0 0;
    border-left: none;
  }
  .row-group:first-child .bios-cell { border-top: none; }
  .row-group:first-child .uefi-cell { border-top: none; }
  .row-group:last-child .bios-cell { border-radius: 0 0 0 var(--radius); }
  .row-group:last-child .uefi-cell { border-radius: 0 0 var(--radius) 0; }

  .row-group:hover .bios-cell { background: var(--bios-light); }
  .row-group:hover .uefi-cell { background: var(--uefi-light); }

  .cell .label {
    font-weight: 600;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }
  .bios-cell .label { color: var(--bios); }
  .uefi-cell .label { color: var(--uefi); }

  .vs-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    color: #bbb;
    letter-spacing: 0.05em;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--neutral);
  }
  .row-group:first-child .vs-cell { border-top: none; }
  .row-group:last-child .vs-cell { border-radius: 0; }

  /* Detail panel */
  .detail-panel {
    display: none;
    grid-column: 1 / -1;
    background: #fafafa;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    padding: 14px 18px 15px;
    font-size: 0.84rem;
    color: #444;
    line-height: 1.6;
    animation: slideDown 0.2s ease;
  }
  .detail-panel.open { display: block; }
  .detail-panel strong { color: var(--text); }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hint-row {
    grid-column: 1 / -1;
    text-align: center;
    font-size: 0.75rem;
    color: #aaa;
    padding: 8px 0 4px;
    letter-spacing: 0.04em;
  }

  /* ── TIMELINE ── */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin: 28px 0 14px;
  }

  .timeline {
    position: relative;
    padding-left: 24px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 7px; top: 8px; bottom: 8px;
    width: 2px;
    background: linear-gradient(to bottom, var(--bios) 0%, var(--bios) 42%, #ccc 42%, #ccc 52%, var(--uefi) 52%, var(--uefi) 100%);
    border-radius: 2px;
  }

  .tl-item {
    position: relative;
    margin-bottom: 12px;
    cursor: pointer;
  }
  .tl-item:last-child { margin-bottom: 0; }

  .tl-dot {
    position: absolute;
    left: -21px;
    top: 10px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 0 0 2px currentColor;
  }
  .tl-item.era-bios .tl-dot { background: var(--bios); color: var(--bios); }
  .tl-item.era-uefi .tl-dot { background: var(--uefi); color: var(--uefi); }
  .tl-item.era-trans .tl-dot { background: #999; color: #999; }

  .tl-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 15px;
    transition: box-shadow 0.18s, transform 0.18s;
  }
  .tl-item:hover .tl-card { box-shadow: var(--shadow); transform: translateX(3px); }
  .tl-item.era-bios .tl-card { border-left: 3px solid var(--bios); }
  .tl-item.era-uefi .tl-card { border-left: 3px solid var(--uefi); }
  .tl-item.era-trans .tl-card { border-left: 3px solid #999; }

  .tl-year {
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .tl-item.era-bios .tl-year { color: var(--bios); }
  .tl-item.era-uefi .tl-year { color: var(--uefi); }
  .tl-item.era-trans .tl-year { color: #888; }

  .tl-text {
    font-size: 0.84rem;
    line-height: 1.5;
    color: #444;
  }

  .tl-detail {
    display: none;
    margin-top: 9px;
    padding-top: 9px;
    border-top: 1px dashed var(--border);
    font-size: 0.81rem;
    color: #666;
    line-height: 1.55;
    animation: slideDown 0.18s ease;
  }
  .tl-detail.open { display: block; }

  /* ── FOOTER NOTE ── */
  .footer-note {
    margin-top: 24px;
    padding: 14px 18px;
    background: #f8f9ff;
    border-radius: var(--radius);
    border: 1px solid #dde5ff;
    font-size: 0.82rem;
    color: #555;
    line-height: 1.6;
    text-align: center;
  }
  .footer-note strong { color: var(--uefi); }
</style>
</head>
<body>
<div class="wrapper">

  <!-- LANG TOGGLE -->
  <div class="lang-bar">
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">🌐 <span id="langLabel">English</span></button>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="eyebrow" data-el="eyebrow">Firmware Technology</div>
    <h1><span class="bios-label">BIOS</span> vs <span class="uefi-label">UEFI</span></h1>
    <div class="subtitle" data-el="subtitle">Κάνε κλικ σε κάθε σειρά για περισσότερες λεπτομέρειες</div>
  </div>

  <!-- COMPARISON GRID -->
  <div class="pillars" id="grid">
    <div class="pillar-head bios-head">📼 BIOS</div>
    <div class="vs-head">VS</div>
    <div class="pillar-head uefi-head">💎 UEFI</div>

    <!-- rows injected by JS -->
  </div>

  <div class="hint-row" data-el="hint">▲ Κλικ για να κλείσεις • Κλικ ξανά για να ανοίξεις</div>

  <!-- TIMELINE -->
  <div class="section-title" data-el="tlTitle">📅 Χρονολόγιο</div>
  <div class="timeline" id="timeline"></div>

  <!-- FOOTER -->
  <div class="footer-note" data-el="footer">
    💡 <strong data-el="footerStrong">Πώς να ελέγξεις:</strong> <span data-el="footerText">Πάτα Windows + R, γράψε <strong>msinfo32</strong> → "Λειτουργία BIOS". Αν γράφει UEFI, είσαι ενημερωμένος!</span>
  </div>

</div>

<script>
// ── DATA ──

      {

      },
      {
        cat: "Ταχύτητα Εκκίνησης",

        bios: "16-bit, παλιά τεχνολογία",
        uefi: "32/64-bit, σύγχρονη πλατφόρμα",
        detail: "Το BIOS τρέχει σε 16-bit real mode — αρχαία αρχιτεκτονική από εποχή 8086. Το UEFI τρέχει σε 32 ή 64-bit protected mode, μπορεί να εκτελεί σύνθετο κώδικα και να συνδέεται ακόμα και στο διαδίκτυο."
      }
    ],
    timeline: [
      { year: "1975–1980", era: "bios", text: "Δημιουργία του BIOS από την IBM", detail: "Ο Gary Kildall και στη συνέχεια η IBM δημιούργησαν το BIOS ως γέφυρα μεταξύ hardware και λογισμικού. Σχεδιάστηκε για μικρές μνήμες και απλά συστήματα." },

  },
  en: {
    eyebrow: "Firmware Technology",

    footerText: "Press Windows + R, type msinfo32 → \"BIOS Mode\". If it says UEFI, you're up to date!",
    rows: [
      {
        cat: "Interface",
        bios: "Black screen, ASCII text",

      },
      {

      },
      {

let lang = 'el';

function toggleLang() {
  lang = lang === 'el' ? 'en' : 'el';
  document.getElementById('langLabel').textContent = lang === 'el' ? 'English' : 'Ελληνικά';
  document.documentElement.lang = lang;
  render();
}

function render() {
  const d = data[lang];

  // static labels
  document.querySelectorAll('[data-el]').forEach(el => {
    const key = el.dataset.el;
    if (d[key] !== undefined) el.textContent = d[key];
  });

  // grid
  const grid = document.getElementById('grid');
  // remove old rows (keep first 3 children: 2 pillar heads + vs-head)
  while (grid.children.length > 3) grid.removeChild(grid.lastChild);

  d.rows.forEach((row, i) => {
    const rg = document.createElement('div');
    rg.className = 'row-group';
    rg.innerHTML = `
      <div class="cell bios-cell">
        <div class="label">${row.cat}</div>
        <div>${row.bios}</div>
      </div>
      <div class="vs-cell">vs</div>
      <div class="cell uefi-cell">
        <div class="label">${row.cat}</div>
        <div>${row.uefi}</div>
      </div>
      <div class="detail-panel" id="dp-${i}">${row.detail}</div>
    `;
    rg.addEventListener('click', () => {
      const dp = document.getElementById('dp-' + i);
      dp.classList.toggle('open');
    });
    grid.appendChild(rg);
  });

  // timeline
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  d.timeline.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = `tl-item era-${item.era}`;
    div.innerHTML = `
      <div class="tl-dot"></div>
      <div class="tl-card">
        <div class="tl-year">${item.year}</div>
        <div class="tl-text">${item.text}</div>
        <div class="tl-detail" id="tld-${i}">${item.detail}</div>
      </div>
    `;
    div.addEventListener('click', () => {
      document.getElementById('tld-' + i).classList.toggle('open');
    });
    tl.appendChild(div);
  });
}

render();
</script>
</body>
</html>
