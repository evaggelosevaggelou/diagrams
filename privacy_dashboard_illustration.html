<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Privacy Dashboard — Android Trick #11</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;padding:1rem}
@keyframes bar-grow{from{width:0}to{width:var(--w)}}
@keyframes alert-pulse{0%,100%{opacity:.7}50%{opacity:1}}
.lang-controls{display:flex;justify-content:center;gap:8px;margin:0 0 10px}
.lang-controls button{padding:6px 14px;font-size:13px;cursor:pointer;border:1px solid #ccc;border-radius:6px;background:#fff}
.lang-controls button.active{font-weight:700;border-color:#888;background:#f0f0f0}
.action-controls{display:flex;justify-content:center;gap:10px;margin:10px 0 4px;flex-wrap:wrap}
.action-controls button{font-size:13px;padding:6px 18px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer}
.action-controls button:hover{background:#f0f0f0}
</style>
</head>
<body>

<div class="lang-controls">
  <button id="btn-el" class="active" onclick="setLang('el')">Ελληνικά</button>
  <button id="btn-en" onclick="setLang('en')">English</button>
</div>

<svg width="100%" viewBox="0 0 680 540">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ===== PHONE ===== -->
<rect x="40" y="30" width="200" height="400" rx="24" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="1.5"/>
<rect x="52" y="52" width="176" height="356" rx="10" fill="#1e2030"/>

<!-- Status bar -->
<rect x="52" y="52" width="176" height="20" rx="10" fill="#111125"/>
<text id="lbl-status" x="140" y="65" text-anchor="middle" font-size="9" fill="#9c9a92">Απόρρητο</text>

<!-- Privacy Dashboard header -->
<rect x="58" y="78" width="164" height="30" rx="6" fill="#16213e"/>
<text id="lbl-dash-title" x="140" y="90" text-anchor="middle" font-size="9" font-weight="600" fill="#B5D4F4">Privacy Dashboard</text>
<text id="lbl-dash-sub" x="140" y="102" text-anchor="middle" font-size="7" fill="#5F5E5A">Τελευταίες 24 ώρες</text>

<!-- Permission categories -->

<!-- CAMERA section -->
<rect x="58" y="116" width="164" height="52" rx="6" fill="#1a1a2e"/>
<rect x="58" y="116" width="4" height="52" rx="2" fill="#E24B4A"/>
<text id="lbl-cam" x="72" y="130" font-size="9" font-weight="600" fill="#F09595">Κάμερα</text>
<text id="lbl-cam-count" x="72" y="143" font-size="8" fill="#888780">5 εφαρμογές — 12 φορές</text>
<!-- mini bar -->
<rect x="72" y="152" width="140" height="6" rx="3" fill="#222240"/>
<rect id="cam-bar" x="72" y="152" width="0" height="6" rx="3" fill="#E24B4A" style="--w:110px"/>
<!-- Suspicious indicator -->
<rect x="190" y="118" width="28" height="14" rx="4" fill="#E24B4A" opacity=".2" stroke="#E24B4A" stroke-width="0.5"/>
<text id="lbl-suspect" x="204" y="128" text-anchor="middle" font-size="7" fill="#F09595">Ύποπτο</text>

<!-- MIC section -->
<rect x="58" y="174" width="164" height="52" rx="6" fill="#1a1a2e"/>
<rect x="58" y="174" width="4" height="52" rx="2" fill="#BA7517"/>
<text id="lbl-mic" x="72" y="188" font-size="9" font-weight="600" fill="#EF9F27">Μικρόφωνο</text>
<text id="lbl-mic-count" x="72" y="201" font-size="8" fill="#888780">3 εφαρμογές — 7 φορές</text>
<rect x="72" y="210" width="140" height="6" rx="3" fill="#222240"/>
<rect id="mic-bar" x="72" y="210" width="0" height="6" rx="3" fill="#BA7517" style="--w:72px"/>

<!-- LOCATION section -->
<rect x="58" y="232" width="164" height="52" rx="6" fill="#1a1a2e"/>
<rect x="58" y="232" width="4" height="52" rx="2" fill="#378ADD"/>
<text id="lbl-loc" x="72" y="246" font-size="9" font-weight="600" fill="#85B7EB">Τοποθεσία</text>
<text id="lbl-loc-count" x="72" y="259" font-size="8" fill="#888780">8 εφαρμογές — 34 φορές</text>
<rect x="72" y="268" width="140" height="6" rx="3" fill="#222240"/>
<rect id="loc-bar" x="72" y="268" width="0" height="6" rx="3" fill="#378ADD" style="--w:140px"/>

<!-- Suspicious app list -->
<rect x="58" y="292" width="164" height="100" rx="6" fill="#200505"/>
<rect x="58" y="292" width="164" height="18" rx="6" fill="#3a0808"/>
<text id="lbl-alert-title" x="140" y="304" text-anchor="middle" font-size="8" font-weight="600" fill="#F09595" style="animation:alert-pulse 2s ease-in-out infinite">Ύποπτη δραστηριότητα</text>

<!-- App 1: suspicious -->
<rect x="64" y="316" width="152" height="34" rx="5" fill="#2a0808" stroke="#E24B4A" stroke-width="0.5"/>
<rect x="68" y="322" width="20" height="20" rx="5" fill="#E24B4A" opacity=".4"/>
<text x="78" y="336" text-anchor="middle" font-size="8" fill="#F09595" font-weight="700">?</text>
<text id="lbl-sus-app" x="94" y="330" font-size="8" font-weight="600" fill="#F09595">FlashLight Pro</text>
<text id="lbl-sus-perm" x="94" y="342" font-size="7" fill="#888780">Κάμερα · Μικρόφωνο · Τοποθεσία</text>

<!-- Remove button -->
<rect x="64" y="356" width="152" height="26" rx="6" fill="#E24B4A" opacity=".15" stroke="#E24B4A" stroke-width="0.5"/>
<text id="lbl-revoke" x="140" y="372" text-anchor="middle" font-size="9" font-weight="600" fill="#F09595">Αφαίρεση δικαιωμάτων</text>

<!-- Home bar -->
<rect x="118" y="420" width="44" height="3" rx="1.5" fill="#444441"/>

<!-- ===== RIGHT PANEL ===== -->

<!-- What each sensor can see -->
<rect x="280" y="38" width="370" height="170" rx="12" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text id="rp-title" x="292" y="58" font-size="11" font-weight="600" fill="#444441">Τι αποκαλύπτει κάθε δικαίωμα:</text>

<!-- Camera row -->
<rect x="292" y="66" width="14" height="14" rx="4" fill="#E24B4A"/>
<text id="rp-cam-label" x="312" y="77" font-size="10" font-weight="600" fill="#A32D2D">Κάμερα</text>
<text id="rp-cam-desc" x="312" y="91" font-size="9" fill="#5F5E5A">Φωτογραφίες, βίντεο, σκηνή δωματίου</text>

<!-- Mic row -->
<rect x="292" y="100" width="14" height="14" rx="4" fill="#BA7517"/>
<text id="rp-mic-label" x="312" y="111" font-size="10" font-weight="600" fill="#633806">Μικρόφωνο</text>
<text id="rp-mic-desc" x="312" y="125" font-size="9" fill="#5F5E5A">Συνομιλίες, φωνή, ήχοι περιβάλλοντος</text>

<!-- Location row -->
<rect x="292" y="134" width="14" height="14" rx="4" fill="#378ADD"/>
<text id="rp-loc-label" x="312" y="145" font-size="10" font-weight="600" fill="#0C447C">Τοποθεσία</text>
<text id="rp-loc-desc" x="312" y="159" font-size="9" fill="#5F5E5A">GPS, σπίτι, εργασία, διαδρομές</text>

<text id="rp-rule" x="292" y="196" font-size="9" font-style="italic" fill="#888780">Κανόνας: εάν μια εφαρμογή δεν τα χρειάζεται, αφαίρεσέ τα!</text>

<!-- How to navigate -->
<rect x="280" y="220" width="370" height="130" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
<text id="nav-title" x="292" y="240" font-size="11" font-weight="600" fill="#3C3489">Πώς να πλοηγηθείτε:</text>

<rect x="292" y="250" width="14" height="14" rx="7" fill="#7F77DD"/>
<text x="299" y="261" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">1</text>
<text id="nav1" x="312" y="261" font-size="10" fill="#534AB7">Ρυθμίσεις → Απόρρητο → Privacy Dashboard</text>

<rect x="292" y="270" width="14" height="14" rx="7" fill="#7F77DD"/>
<text x="299" y="281" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">2</text>
<text id="nav2" x="312" y="281" font-size="10" fill="#534AB7">Επιλέξτε δικαίωμα (κάμερα, μικρόφωνο κλπ.)</text>

<rect x="292" y="290" width="14" height="14" rx="7" fill="#7F77DD"/>
<text x="299" y="301" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">3</text>
<text id="nav3" x="312" y="301" font-size="10" fill="#534AB7">Δείτε ποια εφαρμογή το χρησιμοποίησε και πότε</text>

<rect x="292" y="310" width="14" height="14" rx="7" fill="#E24B4A"/>
<text x="299" y="321" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">!</text>
<text id="nav4" x="312" y="321" font-size="10" fill="#A32D2D">Ύποπτη εφαρμογή; Πατήστε → Αφαίρεση δικαιωμάτων</text>

<rect x="292" y="330" width="14" height="14" rx="7" fill="#1D9E75"/>
<text x="299" y="341" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">+</text>
<text id="nav5" x="312" y="341" font-size="10" fill="#0F6E56">Διαθέσιμο Android 12+ (API level 31)</text>

<!-- Quick tips -->
<rect x="280" y="362" width="370" height="90" rx="12" fill="#1a0a0a" stroke="#E24B4A" stroke-width="0.5"/>
<text id="tips-title" x="292" y="382" font-size="11" font-weight="600" fill="#F09595">Κόκκινες σημαίες — πότε να ανησυχείτε:</text>
<text id="tip1" x="292" y="400" font-size="10" fill="#888780">Εφαρμογή φακού που χρησιμοποιεί μικρόφωνο</text>
<text id="tip2" x="292" y="415" font-size="10" fill="#888780">Παιχνίδι που έχει πρόσβαση σε τοποθεσία 24/7</text>
<text id="tip3" x="292" y="430" font-size="10" fill="#888780">Άγνωστη εφαρμογή με πρόσβαση σε κάμερα</text>
<text id="tip4" x="292" y="445" font-size="10" fill="#888780">Οποιαδήποτε εφαρμογή με όλα τα δικαιώματα</text>

<!-- Steps bottom -->
<rect x="30" y="466" width="620" height="58" rx="10" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text id="step-title" x="340" y="486" text-anchor="middle" font-size="11" font-weight="600" fill="#444441">Privacy Dashboard — Πλήρης έλεγχος πρόσβασης εφαρμογών</text>
<text id="step1" x="40" y="502" font-size="10" fill="#5F5E5A">Ελέγξτε ποια εφαρμογή χρησιμοποίησε κάμερα, μικρόφωνο ή τοποθεσία τις τελευταίες 24 ώρες</text>
<text id="step2" x="40" y="516" font-size="10" fill="#5F5E5A">Αφαιρέστε δικαιώματα από εφαρμογές που δεν τα χρειάζονται — προστατέψτε τα προσωπικά σας δεδομένα</text>
</svg>

<div class="action-controls">
  <button id="btn-scan" onclick="runScan()">Σάρωση δικαιωμάτων!</button>
  <button id="btn-revoke" onclick="revokePerms()">Αφαίρεση δικαιωμάτων!</button>
  <button id="btn-reset" onclick="resetDemo()">Reset</button>
</div>

<script>
var lang='el', scanned=false, revoked=false;
var tx={
  el:{
    status:'Απόρρητο', dashTitle:'Privacy Dashboard', dashSub:'Τελευταίες 24 ώρες',
    cam:'Κάμερα', camCount:'5 εφαρμογές — 12 φορές',
    mic:'Μικρόφωνο', micCount:'3 εφαρμογές — 7 φορές',
    loc:'Τοποθεσία', locCount:'8 εφαρμογές — 34 φορές',
    suspect:'Ύποπτο', alertTitle:'Ύποπτη δραστηριότητα',
    susApp:'FlashLight Pro', susPerm:'Κάμερα · Μικρόφωνο · Τοποθεσία',
    revoke:'Αφαίρεση δικαιωμάτων', revokeOk:'Δικαιώματα αφαιρέθηκαν!',
    rpTitle:'Τι αποκαλύπτει κάθε δικαίωμα:',
    rpCamLabel:'Κάμερα', rpCamDesc:'Φωτογραφίες, βίντεο, σκηνή δωματίου',
    rpMicLabel:'Μικρόφωνο', rpMicDesc:'Συνομιλίες, φωνή, ήχοι περιβάλλοντος',
    rpLocLabel:'Τοποθεσία', rpLocDesc:'GPS, σπίτι, εργασία, διαδρομές',
    rpRule:'Κανόνας: εάν μια εφαρμογή δεν τα χρειάζεται, αφαίρεσέ τα!',
    navTitle:'Πώς να πλοηγηθείτε:',
    nav1:'Ρυθμίσεις → Απόρρητο → Privacy Dashboard',
    nav2:'Επιλέξτε δικαίωμα (κάμερα, μικρόφωνο κλπ.)',
    nav3:'Δείτε ποια εφαρμογή το χρησιμοποίησε και πότε',
    nav4:'Ύποπτη εφαρμογή; Πατήστε → Αφαίρεση δικαιωμάτων',
    nav5:'Διαθέσιμο Android 12+ (API level 31)',
    tipsTitle:'Κόκκινες σημαίες — πότε να ανησυχείτε:',
    tip1:'Εφαρμογή φακού που χρησιμοποιεί μικρόφωνο',
    tip2:'Παιχνίδι που έχει πρόσβαση σε τοποθεσία 24/7',
    tip3:'Άγνωστη εφαρμογή με πρόσβαση σε κάμερα',
    tip4:'Οποιαδήποτε εφαρμογή με όλα τα δικαιώματα',
    stepTitle:'Privacy Dashboard — Πλήρης έλεγχος πρόσβασης εφαρμογών',
    step1:'Ελέγξτε ποια εφαρμογή χρησιμοποίησε κάμερα, μικρόφωνο ή τοποθεσία τις τελευταίες 24 ώρες',
    step2:'Αφαιρέστε δικαιώματα από εφαρμογές που δεν τα χρειάζονται — προστατέψτε τα προσωπικά σας δεδομένα',
    btnScan:'Σάρωση δικαιωμάτων!', btnRevoke:'Αφαίρεση δικαιωμάτων!', btnReset:'Reset'
  },
  en:{
    status:'Privacy', dashTitle:'Privacy Dashboard', dashSub:'Last 24 hours',
    cam:'Camera', camCount:'5 apps — 12 times',
    mic:'Microphone', micCount:'3 apps — 7 times',
    loc:'Location', locCount:'8 apps — 34 times',
    suspect:'Suspicious', alertTitle:'Suspicious activity',
    susApp:'FlashLight Pro', susPerm:'Camera · Microphone · Location',
    revoke:'Revoke permissions', revokeOk:'Permissions revoked!',
    rpTitle:'What each permission reveals:',
    rpCamLabel:'Camera', rpCamDesc:'Photos, videos, room scene',
    rpMicLabel:'Microphone', rpMicDesc:'Conversations, voice, ambient sounds',
    rpLocLabel:'Location', rpLocDesc:'GPS, home, work, routes',
    rpRule:'Rule: if an app does not need it, remove it!',
    navTitle:'How to navigate:',
    nav1:'Settings → Privacy → Privacy Dashboard',
    nav2:'Select a permission (camera, microphone, etc.)',
    nav3:'See which app used it and when',
    nav4:'Suspicious app? Tap → Revoke permissions',
    nav5:'Available Android 12+ (API level 31)',
    tipsTitle:'Red flags — when to be concerned:',
    tip1:'Flashlight app using the microphone',
    tip2:'Game accessing location 24/7',
    tip3:'Unknown app with camera access',
    tip4:'Any app with all permissions granted',
    stepTitle:'Privacy Dashboard — Full app access control',
    step1:'Check which app used camera, microphone or location in the last 24 hours',
    step2:'Remove permissions from apps that do not need them — protect your personal data',
    btnScan:'Scan permissions!', btnRevoke:'Revoke permissions!', btnReset:'Reset'
  }
};

function setLang(l){
  lang=l; var t=tx[l];
  document.getElementById('lbl-status').textContent=t.status;
  document.getElementById('lbl-dash-title').textContent=t.dashTitle;
  document.getElementById('lbl-dash-sub').textContent=t.dashSub;
  document.getElementById('lbl-cam').textContent=t.cam;
  document.getElementById('lbl-cam-count').textContent=t.camCount;
  document.getElementById('lbl-mic').textContent=t.mic;
  document.getElementById('lbl-mic-count').textContent=t.micCount;
  document.getElementById('lbl-loc').textContent=t.loc;
  document.getElementById('lbl-loc-count').textContent=t.locCount;
  document.getElementById('lbl-suspect').textContent=t.suspect;
  document.getElementById('lbl-alert-title').textContent=t.alertTitle;
  document.getElementById('lbl-sus-app').textContent=t.susApp;
  document.getElementById('lbl-sus-perm').textContent=t.susPerm;
  document.getElementById('lbl-revoke').textContent=revoked?t.revokeOk:t.revoke;
  document.getElementById('rp-title').textContent=t.rpTitle;
  document.getElementById('rp-cam-label').textContent=t.rpCamLabel;
  document.getElementById('rp-cam-desc').textContent=t.rpCamDesc;
  document.getElementById('rp-mic-label').textContent=t.rpMicLabel;
  document.getElementById('rp-mic-desc').textContent=t.rpMicDesc;
  document.getElementById('rp-loc-label').textContent=t.rpLocLabel;
  document.getElementById('rp-loc-desc').textContent=t.rpLocDesc;
  document.getElementById('rp-rule').textContent=t.rpRule;
  document.getElementById('nav-title').textContent=t.navTitle;
  document.getElementById('nav1').textContent=t.nav1;
  document.getElementById('nav2').textContent=t.nav2;
  document.getElementById('nav3').textContent=t.nav3;
  document.getElementById('nav4').textContent=t.nav4;
  document.getElementById('nav5').textContent=t.nav5;
  document.getElementById('tips-title').textContent=t.tipsTitle;
  document.getElementById('tip1').textContent=t.tip1;
  document.getElementById('tip2').textContent=t.tip2;
  document.getElementById('tip3').textContent=t.tip3;
  document.getElementById('tip4').textContent=t.tip4;
  document.getElementById('step-title').textContent=t.stepTitle;
  document.getElementById('step1').textContent=t.step1;
  document.getElementById('step2').textContent=t.step2;
  document.getElementById('btn-scan').textContent=t.btnScan;
  document.getElementById('btn-revoke').textContent=t.btnRevoke;
  document.getElementById('btn-reset').textContent=t.btnReset;
  document.getElementById('btn-el').className=(l==='el')?'active':'';
  document.getElementById('btn-en').className=(l==='en')?'active':'';
}

function animBar(id, targetW, delay){
  setTimeout(function(){
    var el=document.getElementById(id);
    el.style.transition='width 1s ease';
    el.setAttribute('width', targetW);
  }, delay);
}

function runScan(){
  scanned=true;
  animBar('cam-bar', 110, 100);
  animBar('mic-bar', 72, 400);
  animBar('loc-bar', 140, 700);
}

function revokePerms(){
  revoked=true;
  var susApp=document.getElementById('lbl-sus-app');
  susApp.setAttribute('fill','#444441');
  susApp.textContent=(lang==='el')?'FlashLight Pro — Ανακλήθηκε':'FlashLight Pro — Revoked';
  document.getElementById('lbl-revoke').textContent=tx[lang].revokeOk;
  document.getElementById('lbl-revoke').setAttribute('fill','#1D9E75');
  document.querySelector('rect[fill="#E24B4A"][opacity=".15"]').setAttribute('fill','#1D9E75');
}

function resetDemo(){
  scanned=false; revoked=false;
  ['cam-bar','mic-bar','loc-bar'].forEach(function(id){
    var el=document.getElementById(id);
    el.style.transition='';
    el.setAttribute('width','0');
  });
  document.getElementById('lbl-sus-app').setAttribute('fill','#F09595');
  document.getElementById('lbl-sus-app').textContent=tx[lang].susApp;
  document.getElementById('lbl-revoke').textContent=tx[lang].revoke;
  document.getElementById('lbl-revoke').setAttribute('fill','#F09595');
  document.querySelector('rect[fill="#1D9E75"][opacity=".15"]') &&
    document.querySelector('rect[fill="#1D9E75"][opacity=".15"]').setAttribute('fill','#E24B4A');
}

setLang('el');
</script>
</body>
</html>
