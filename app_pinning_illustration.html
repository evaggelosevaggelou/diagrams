<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>App Pinning — Android Trick #3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;padding:1rem}
@keyframes pin-bounce{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
.lang-controls{display:flex;justify-content:center;gap:8px;margin:0 0 10px}
.lang-controls button{padding:6px 14px;font-size:13px;cursor:pointer;border:1px solid #ccc;border-radius:6px;background:#fff}
.lang-controls button.active{font-weight:700;border-color:#888;background:#f0f0f0}
.action-controls{display:flex;justify-content:center;gap:10px;margin:10px 0 4px;flex-wrap:wrap}
.action-controls button{font-size:13px;padding:6px 18px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer}
.action-controls button:hover{background:#f0f0f0}
</style>
</head>
<body>

<div class="lang-controls">
  <button id="btn-el" class="active" onclick="setLang('el')">Ελληνικά</button>
  <button id="btn-en" onclick="setLang('en')">English</button>
</div>

<svg width="100%" viewBox="0 0 680 500">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <clipPath id="sc2"><rect x="298" y="82" width="84" height="148" rx="6"/></clipPath>
  <clipPath id="sc3"><rect x="488" y="82" width="84" height="148" rx="6"/></clipPath>
</defs>

<!-- === PHONE 1: Normal === -->
<rect x="96" y="50" width="108" height="220" rx="16" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="1"/>
<rect x="108" y="82" width="84" height="148" rx="6" fill="#1e2030"/>
<rect x="116" y="90" width="28" height="28" rx="5" fill="#378ADD" opacity=".8"/>
<rect x="150" y="90" width="28" height="28" rx="5" fill="#1D9E75" opacity=".8"/>
<rect x="116" y="124" width="28" height="28" rx="5" fill="#D85A30" opacity=".8"/>
<rect x="150" y="124" width="28" height="28" rx="5" fill="#7F77DD" opacity=".8"/>
<rect x="116" y="158" width="28" height="28" rx="5" fill="#BA7517" opacity=".8"/>
<rect x="150" y="158" width="28" height="28" rx="5" fill="#E24B4A" opacity=".8"/>
<rect x="116" y="192" width="62" height="28" rx="5" fill="#888780" opacity=".4"/>
<rect x="128" y="260" width="44" height="3" rx="1.5" fill="#444441"/>
<text id="lbl1" x="150" y="292" text-anchor="middle" font-size="11" fill="#888780">Κανονική χρήση</text>
<text id="lbl1b" x="150" y="306" text-anchor="middle" font-size="10" fill="#5F5E5A">Πρόσβαση παντού</text>

<!-- Arrow 1→2 -->
<path d="M210 160 L280 160" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text id="lbl-arrow1" x="245" y="152" text-anchor="middle" font-size="10" fill="#854F0B">App Pinning</text>

<!-- === PHONE 2: Pinned === -->
<rect x="286" y="50" width="108" height="220" rx="16" fill="#2C2C2A" stroke="#1D9E75" stroke-width="2"/>
<rect x="298" y="82" width="84" height="148" rx="6" fill="#1a3a2a" clip-path="url(#sc2)"/>
<line x1="298" y1="108" x2="382" y2="108" stroke="#2d5a3d" stroke-width="0.5"/>
<line x1="298" y1="134" x2="382" y2="134" stroke="#2d5a3d" stroke-width="0.5"/>
<line x1="298" y1="160" x2="382" y2="160" stroke="#2d5a3d" stroke-width="0.5"/>
<line x1="298" y1="186" x2="382" y2="186" stroke="#2d5a3d" stroke-width="0.5"/>
<line x1="320" y1="82" x2="320" y2="230" stroke="#2d5a3d" stroke-width="0.5"/>
<line x1="344" y1="82" x2="344" y2="230" stroke="#2d5a3d" stroke-width="0.5"/>
<line x1="368" y1="82" x2="368" y2="230" stroke="#2d5a3d" stroke-width="0.5"/>
<circle cx="340" cy="148" r="8" fill="#E24B4A"/>
<circle cx="340" cy="148" r="3" fill="#fff"/>
<g id="pin-icon">
  <circle cx="375" cy="68" r="10" fill="#1D9E75"/>
  <rect x="373" y="62" width="3" height="7" rx="1" fill="#fff" transform="rotate(20,374,65)"/>
  <circle cx="375" cy="69" r="3" fill="#fff"/>
</g>
<rect x="298" y="82" width="84" height="14" rx="0" fill="#0a1520" opacity=".9"/>
<text id="pinned-label" x="340" y="93" text-anchor="middle" font-size="8" fill="#1D9E75">Χάρτες — καρφιτσωμένο</text>
<rect x="318" y="260" width="44" height="3" rx="1.5" fill="#444441"/>
<text id="lbl2" x="340" y="292" text-anchor="middle" font-size="11" fill="#1D9E75">Καρφιτσωμένη εφαρμογή</text>
<text id="lbl2b" x="340" y="306" text-anchor="middle" font-size="10" fill="#0F6E56">Μόνο αυτή η εφαρμογή</text>

<!-- Arrow 2→3 -->
<path d="M400 160 L470 160" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text id="lbl-arrow2" x="435" y="152" text-anchor="middle" font-size="10" fill="#A32D2D">Προσπάθεια εξόδου</text>

<!-- === PHONE 3: Blocked === -->
<rect x="476" y="50" width="108" height="220" rx="16" fill="#2C2C2A" stroke="#E24B4A" stroke-width="1.5"/>
<rect x="488" y="82" width="84" height="148" rx="6" fill="#1a3a2a" clip-path="url(#sc3)"/>
<line x1="488" y1="108" x2="572" y2="108" stroke="#2d5a3d" stroke-width="0.5"/>
<line x1="488" y1="134" x2="572" y2="134" stroke="#2d5a3d" stroke-width="0.5"/>
<line x1="488" y1="160" x2="572" y2="160" stroke="#2d5a3d" stroke-width="0.5"/>
<line x1="488" y1="186" x2="572" y2="186" stroke="#2d5a3d" stroke-width="0.5"/>
<line x1="510" y1="82" x2="510" y2="230" stroke="#2d5a3d" stroke-width="0.5"/>
<line x1="534" y1="82" x2="534" y2="230" stroke="#2d5a3d" stroke-width="0.5"/>
<line x1="558" y1="82" x2="558" y2="230" stroke="#2d5a3d" stroke-width="0.5"/>
<circle cx="530" cy="148" r="8" fill="#E24B4A"/>
<circle cx="530" cy="148" r="3" fill="#fff"/>
<rect x="488" y="158" width="84" height="72" fill="#1a0505" opacity=".92"/>
<text id="lbl-exit1" x="530" y="180" text-anchor="middle" font-size="9" font-weight="600" fill="#F09595">Αδύνατη έξοδος</text>
<text id="lbl-exit2" x="530" y="194" text-anchor="middle" font-size="8" fill="#888780">Κρατήστε</text>
<text id="lbl-exit3" x="530" y="205" text-anchor="middle" font-size="8" fill="#888780">Back + Recents</text>
<text id="lbl-exit4" x="530" y="220" text-anchor="middle" font-size="8" fill="#5F5E5A">ή εισαγωγή PIN</text>
<rect x="508" y="260" width="44" height="3" rx="1.5" fill="#444441"/>
<text id="lbl3" x="530" y="292" text-anchor="middle" font-size="11" fill="#E24B4A">Προστατευμένο</text>
<text id="lbl3b" x="530" y="306" text-anchor="middle" font-size="10" fill="#A32D2D">Χρειάζεται PIN για έξοδο</text>

<!-- === STEP GUIDE === -->
<rect x="40" y="340" width="600" height="130" rx="12" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text id="step-title" x="340" y="366" text-anchor="middle" font-size="12" font-weight="600" fill="#444441">Πώς να ενεργοποιήσετε το App Pinning</text>
<rect x="60" y="380" width="16" height="16" rx="8" fill="#7F77DD"/>
<text x="69" y="392" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">1</text>
<text id="step1" x="86" y="392" font-size="11" fill="#5F5E5A">Ρυθμίσεις → Ασφάλεια → App Pinning → Ενεργοποίηση</text>
<rect x="60" y="402" width="16" height="16" rx="8" fill="#7F77DD"/>
<text x="69" y="414" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">2</text>
<text id="step2" x="86" y="414" font-size="11" fill="#5F5E5A">Ανοίξτε την εφαρμογή → Πρόσφατες εφαρμογές (τετράγωνο)</text>
<rect x="60" y="424" width="16" height="16" rx="8" fill="#7F77DD"/>
<text x="69" y="436" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">3</text>
<text id="step3" x="86" y="436" font-size="11" fill="#5F5E5A">Πατήστε το εικονίδιο της εφαρμογής → Καρφίτσωμα</text>
<rect x="60" y="446" width="16" height="16" rx="8" fill="#E24B4A"/>
<text x="69" y="458" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">!</text>
<text id="step4" x="86" y="458" font-size="11" fill="#A32D2D">Έξοδος: κρατήστε Back + Recents ταυτόχρονα</text>
</svg>

<div class="action-controls">
  <button id="btn-demo" onclick="runDemo()">Δείξε την εφαρμογή καρφιτσωμένη!</button>
  <button id="btn-reset" onclick="resetDemo()">Reset</button>
</div>

<script>
var lang = 'el';
var tx = {
  el:{
    lbl1:'Κανονική χρήση',lbl1b:'Πρόσβαση παντού',
    lbl2:'Καρφιτσωμένη εφαρμογή',lbl2b:'Μόνο αυτή η εφαρμογή',
    lbl3:'Προστατευμένο',lbl3b:'Χρειάζεται PIN για έξοδο',
    arrow1:'App Pinning',arrow2:'Προσπάθεια εξόδου',
    exit1:'Αδύνατη έξοδος',exit2:'Κρατήστε',exit3:'Back + Recents',exit4:'ή εισαγωγή PIN',
    pinned:'Χάρτες — καρφιτσωμένο',
    stepTitle:'Πώς να ενεργοποιήσετε το App Pinning',
    step1:'Ρυθμίσεις → Ασφάλεια → App Pinning → Ενεργοποίηση',
    step2:'Ανοίξτε την εφαρμογή → Πρόσφατες εφαρμογές (τετράγωνο)',
    step3:'Πατήστε το εικονίδιο της εφαρμογής → Καρφίτσωμα',
    step4:'Έξοδος: κρατήστε Back + Recents ταυτόχρονα',
    btnDemo:'Δείξε την εφαρμογή καρφιτσωμένη!',btnReset:'Reset'
  },
  en:{
    lbl1:'Normal use',lbl1b:'Access everywhere',
    lbl2:'Pinned app',lbl2b:'This app only',
    lbl3:'Protected',lbl3b:'PIN required to exit',
    arrow1:'App Pinning',arrow2:'Exit attempt',
    exit1:'Cannot exit',exit2:'Hold',exit3:'Back + Recents',exit4:'or enter PIN',
    pinned:'Maps — pinned',
    stepTitle:'How to enable App Pinning',
    step1:'Settings → Security → App Pinning → Enable',
    step2:'Open the app → Recent apps (square button)',
    step3:'Tap the app icon → Pin',
    step4:'To exit: hold Back + Recents simultaneously',
    btnDemo:'Show pinned app!',btnReset:'Reset'
  }
};

function setLang(l){
  lang=l;
  var t=tx[l];
  ['lbl1','lbl1b','lbl2','lbl2b','lbl3','lbl3b'].forEach(function(id){
    document.getElementById(id).textContent=t[id];
  });
  document.getElementById('lbl-arrow1').textContent=t.arrow1;
  document.getElementById('lbl-arrow2').textContent=t.arrow2;
  document.getElementById('lbl-exit1').textContent=t.exit1;
  document.getElementById('lbl-exit2').textContent=t.exit2;
  document.getElementById('lbl-exit3').textContent=t.exit3;
  document.getElementById('lbl-exit4').textContent=t.exit4;
  document.getElementById('pinned-label').textContent=t.pinned;
  document.getElementById('step-title').textContent=t.stepTitle;
  document.getElementById('step1').textContent=t.step1;
  document.getElementById('step2').textContent=t.step2;
  document.getElementById('step3').textContent=t.step3;
  document.getElementById('step4').textContent=t.step4;
  document.getElementById('btn-demo').textContent=t.btnDemo;
  document.getElementById('btn-reset').textContent=t.btnReset;
  document.getElementById('btn-el').className=(l==='el')?'active':'';
  document.getElementById('btn-en').className=(l==='en')?'active':'';
}

function runDemo(){
  var pi=document.getElementById('pin-icon');
  pi.style.transformOrigin='375px 68px';
  pi.style.animation='none';
  void pi.offsetWidth;
  pi.style.animation='pin-bounce 0.5s ease forwards';
}

function resetDemo(){
  var pi=document.getElementById('pin-icon');
  pi.style.animation='none';
  pi.style.transform='scale(1)';
}

setLang('el');
</script>
</body>
</html>
