<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Diagram with Language Toggle</title>
<style>
@keyframes ping { 0%{r:18;opacity:.6} 100%{r:40;opacity:0} }
@keyframes ping2 { 0%{r:18;opacity:.5} 100%{r:55;opacity:0} }
@keyframes unlock { 0%,60%{transform:translateY(0)} 80%{transform:translateY(-4px)} 100%{transform:translateY(-7px)} }
@keyframes fadein { from{opacity:0} to{opacity:1} }
.ping1 { animation: ping 1.8s ease-out infinite; transform-origin: 340px 295px; }
.ping2 { animation: ping2 1.8s ease-out infinite .5s; transform-origin: 340px 295px; }
.shackle { transform-origin: 340px 198px; }
.shackle.open { animation: unlock .5s ease-out forwards; }
.label-fade { animation: fadein .4s ease-out forwards; }

/* Simple styling for language buttons */
.lang-controls { display:flex; justify-content:center; gap:8px; margin:10px 0; }
.lang-controls button { padding:6px 12px; font-size:13px; cursor:pointer; }
.action-controls { display:flex;justify-content:center;gap:12px;margin:8px 0 4px }
.action-controls button { font-size:13px;padding:6px 18px; cursor:pointer; }
</style>
</head>
<body>

<!-- Language selection -->
<div class="lang-controls" aria-hidden="false">
  <button id="btn-lang-el" onclick="setLanguage('el')">Ελληνικά</button>
  <button id="btn-lang-en" onclick="setLanguage('en')">English</button>
</div>

<!-- SVG diagram (structure unchanged visually) -->
<svg width="100%" viewBox="0 0 680 500" role="img" aria-label="Access diagram">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- === SCENE BACKGROUND areas === -->

<!-- Left zone: home -->
<rect x="20" y="40" width="185" height="430" rx="16" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5" opacity="0.5"/>
<!-- Right zone: outside -->
<rect x="475" y="40" width="185" height="430" rx="16" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5" opacity="0.5"/>

<!-- Zone labels -->
<text id="zone-safe" class="ts" x="112" y="68" text-anchor="middle" fill="#085041">Ασφαλής τοποθεσία</text>
<text id="zone-outside" class="ts" x="567" y="68" text-anchor="middle" fill="#A32D2D">Εκτός περιοχής</text>

<!-- === HOUSE (left) === -->
<!-- House body -->
<rect x="44" y="200" width="137" height="110" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
<!-- Roof -->
<polygon points="30,200 112,130 194,200" fill="#5DCAA5" stroke="#0F6E56" stroke-width="1"/>
<!-- Door -->
<rect x="92" y="254" width="40" height="56" rx="4" fill="#085041"/>
<!-- Window -->
<rect x="54" y="224" width="28" height="24" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="104" y="224" width="28" height="24" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>

<!-- Home label -->
<text id="home-label" class="ts" x="112" y="334" text-anchor="middle" fill="#085041">Σπίτι</text>

<!-- BT device (smartwatch) bottom left -->
<rect x="54" y="365" width="60" height="68" rx="10" fill="#1D9E75" stroke="#0F6E56" stroke-width="1"/>
<rect x="62" y="374" width="44" height="32" rx="4" fill="#E1F5EE"/>
<text id="bt-text" class="ts" x="84" y="394" text-anchor="middle" fill="#0F6E56">BT</text>
<text id="smartwatch-text" class="ts" x="84" y="446" text-anchor="middle" fill="#085041">Smartwatch</text>

<!-- Car bottom left -->
<rect x="122" y="368" width="75" height="42" rx="8" fill="#1D9E75" stroke="#0F6E56" stroke-width="1"/>
<rect x="130" y="358" width="58" height="22" rx="5" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
<circle cx="138" cy="412" r="8" fill="#085041"/>
<circle cx="181" cy="412" r="8" fill="#085041"/>
<text id="car-text" class="ts" x="160" y="446" text-anchor="middle" fill="#085041">Αυτοκίνητο</text>

<!-- === PHONE CENTER === -->
<!-- Phone body -->
<rect x="290" y="160" width="100" height="190" rx="18" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
<!-- Screen -->
<rect x="298" y="172" width="84" height="154" rx="12" fill="#2C2C2A"/>
<!-- Lock icon on screen -->
<!-- Lock body -->
<g class="shackle" id="shackle-g">
  <rect x="325" y="212" width="30" height="26" rx="5" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <!-- Shackle arc -->
  <path id="shackle-path" d="M330 212 Q330 193 340 193 Q350 193 350 212" fill="none" stroke="#185FA5" stroke-width="2.5" stroke-linecap="round"/>
</g>
<!-- Lock label on screen -->
<text id="lock-label" class="ts" x="340" y="256" text-anchor="middle" fill="#B5D4F4">Κλειδωμένο</text>

<!-- Status bar on phone -->
<rect x="302" y="176" width="76" height="12" rx="3" fill="#444441" opacity=".5"/>

<!-- Ping rings (BT/location signal from phone) -->
<circle class="ping1" cx="340" cy="295" r="18" fill="none" stroke="#378ADD" stroke-width="1.2"/>
<circle class="ping2" cx="340" cy="295" r="18" fill="none" stroke="#378ADD" stroke-width="0.7"/>

<!-- Signal dot center -->
<circle cx="340" cy="295" r="5" fill="#185FA5" opacity=".7"/>

<!-- === ARROWS === -->
<!-- Arrow: home → phone (trusted) -->
<path d="M205 265 Q248 265 288 248" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
<!-- Label on arrow -->
<text id="arrow-trusted" class="ts" x="246" y="252" text-anchor="middle" fill="#085041">Αξιόπιστη</text>

<!-- Arrow: outside → phone (untrusted) -->
<path d="M473 265 Q430 265 392 248" fill="none" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
<text id="arrow-unknown" class="ts" x="432" y="252" text-anchor="middle" fill="#A32D2D">Άγνωστη</text>

<!-- === RIGHT: person outside === -->
<!-- Person silhouette -->
<circle cx="567" cy="200" r="22" fill="#F09595" stroke="#A32D2D" stroke-width="1"/>
<rect x="548" y="228" width="38" height="52" rx="8" fill="#F09595" stroke="#A32D2D" stroke-width="1"/>
<!-- X mark (denied) -->
<line x1="550" y1="310" x2="582" y2="342" stroke="#E24B4A" stroke-width="3" stroke-linecap="round"/>
<line x1="582" y1="310" x2="550" y2="342" stroke="#E24B4A" stroke-width="3" stroke-linecap="round"/>
<text id="access-text" class="ts" x="567" y="366" text-anchor="middle" fill="#A32D2D">Πρόσβαση αποκλεισμένη</text>

<!-- === BOTTOM: result states === -->
<rect x="210" y="410" width="260" height="56" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<text id="bottom-title" class="th" x="340" y="433" text-anchor="middle" fill="#085041">Στο σπίτι / BT συσκευή</text>
<text id="bottom-subtitle" class="ts" x="340" y="452" text-anchor="middle" fill="#0F6E56">Αυτόματο ξεκλείδωμα</text>

<!-- Interactive button area left intentionally empty visually -->
</svg>

<!-- Action buttons -->
<div class="action-controls">
  <button id="btn-home" onclick="simulateHome()">Φτάνω σπίτι</button>
  <button id="btn-out" onclick="simulateOut()">Φεύγω έξω</button>
</div>

<script>
/* Translation dictionary */
const texts = {
  el: {
    zoneSafe: 'Ασφαλής τοποθεσία',
    zoneOutside: 'Εκτός περιοχής',
    home: 'Σπίτι',
    bt: 'BT',
    smartwatch: 'Smartwatch',
    car: 'Αυτοκίνητο',
    lockLocked: 'Κλειδωμένο',
    lockUnlocked: 'Ξεκλείδωτο',
    trusted: 'Αξιόπιστη',
    unknown: 'Άγνωστη',
    accessDenied: 'Πρόσβαση αποκλεισμένη',
    bottomTitle: 'Στο σπίτι / BT συσκευή',
    bottomSubtitle: 'Αυτόματο ξεκλείδωμα',
    btnHome: 'Φτάνω σπίτι',
    btnOut: 'Φεύγω έξω'
  },
  en: {
    zoneSafe: 'Safe location',
    zoneOutside: 'Outside area',
    home: 'Home',
    bt: 'BT',
    smartwatch: 'Smartwatch',
    car: 'Car',
    lockLocked: 'Locked',
    lockUnlocked: 'Unlocked',
    trusted: 'Trusted',
    unknown: 'Unknown',
    accessDenied: 'Access denied',
    bottomTitle: 'At home / BT device',
    bottomSubtitle: 'Automatic unlock',
    btnHome: 'Arrive home',
    btnOut: 'Go outside'
  }
};

/* Current language state */
let currentLang = 'el';

/* Elements to update */
const elements = {
  zoneSafe: document.getElementById('zone-safe'),
  zoneOutside: document.getElementById('zone-outside'),
  homeLabel: document.getElementById('home-label'),
  btText: document.getElementById('bt-text'),
  smartwatchText: document.getElementById('smartwatch-text'),
  carText: document.getElementById('car-text'),
  lockLabel: document.getElementById('lock-label'),
  arrowTrusted: document.getElementById('arrow-trusted'),
  arrowUnknown: document.getElementById('arrow-unknown'),
  accessText: document.getElementById('access-text'),
  bottomTitle: document.getElementById('bottom-title'),
  bottomSubtitle: document.getElementById('bottom-subtitle'),
  btnHome: document.getElementById('btn-home'),
  btnOut: document.getElementById('btn-out'),
  btnLangEl: document.getElementById('btn-lang-el'),
  btnLangEn: document.getElementById('btn-lang-en')
};

/* Apply language to all labeled elements */
function setLanguage(lang) {
  currentLang = lang;
  const t = texts[lang];

  elements.zoneSafe.textContent = t.zoneSafe;
  elements.zoneOutside.textContent = t.zoneOutside;
  elements.homeLabel.textContent = t.home;
  elements.btText.textContent = t.bt;
  elements.smartwatchText.textContent = t.smartwatch;
  elements.carText.textContent = t.car;
  // lock label should reflect current lock state; keep current text if unlocked
  const isUnlocked = elements.lockLabel.textContent === texts['el'].lockUnlocked || elements.lockLabel.textContent === texts['en'].lockUnlocked;
  elements.lockLabel.textContent = isUnlocked ? t.lockUnlocked : t.lockLocked;
  elements.arrowTrusted.textContent = t.trusted;
  elements.arrowUnknown.textContent = t.unknown;
  elements.accessText.textContent = t.accessDenied;
  elements.bottomTitle.textContent = t.bottomTitle;
  elements.bottomSubtitle.textContent = t.bottomSubtitle;
  elements.btnHome.textContent = t.btnHome;
  elements.btnOut.textContent = t.btnOut;

  // Visual cue for active language button
  elements.btnLangEl.style.fontWeight = (lang === 'el') ? '700' : '400';
  elements.btnLangEn.style.fontWeight = (lang === 'en') ? '700' : '400';
}

/* Simulate arriving home: animate shackle and update lock label */
function simulateHome() {
  var s = document.getElementById('shackle-g');
  var p = document.getElementById('shackle-path');
  var l = document.getElementById('lock-label');
  s.classList.add('open');
  p.setAttribute('d','M330 212 Q330 185 340 185 Q350 185 350 212');
  l.textContent = texts[currentLang].lockUnlocked;
  l.setAttribute('fill','#9FE1CB');
}

/* Simulate leaving outside: reset shackle and update lock label */
function simulateOut() {
  var s = document.getElementById('shackle-g');
  var p = document.getElementById('shackle-path');
  var l = document.getElementById('lock-label');
  s.classList.remove('open');
  p.setAttribute('d','M330 212 Q330 193 340 193 Q350 193 350 212');
  l.textContent = texts[currentLang].lockLocked;
  l.setAttribute('fill','#B5D4F4');
}

/* Initialize UI with default language */
setLanguage(currentLang);
</script>

</body>
</html>
