<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagrams – lovefortechnology.net</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #2ea043;
    --accent2: #388bfd;
    --text: #e6edf3;
    --muted: #7d8590;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  header { border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; align-items: center; gap: 16px; }
  .logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { color: var(--muted); font-size: 14px; margin-left: auto; font-family: var(--mono); }
  .hero { padding: 48px 40px 32px; max-width: 1200px; margin: 0 auto; }
  .hero h2 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
  .hero p { color: var(--muted); font-size: 15px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px; padding: 0 40px 60px; max-width: 1200px; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
  .card:hover { border-color: var(--accent2); transform: translateY(-2px); }
  .preview { width: 100%; height: 220px; border: none; background: #fff; display: block; pointer-events: none; }
  .card-body { padding: 16px 20px 20px; border-top: 1px solid var(--border); }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .card-file { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .actions { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: 500; font-family: var(--sans); cursor: pointer; border: 1px solid var(--border); text-decoration: none; text-align: center; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-open { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-open:hover { background: #3fb950; }
  .btn-copy { background: transparent; color: var(--text); }
  .btn-copy:hover { background: #21262d; border-color: var(--accent2); }
  .btn-copy.copied { color: var(--accent); border-color: var(--accent); }
  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 15px; }
  .empty { text-align: center; padding: 60px; color: var(--muted); }

  /* Pagination */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 6px; padding: 0 40px 48px; flex-wrap: wrap; }
  .page-btn { min-width: 36px; height: 36px; padding: 0 10px; border-radius: 6px; font-size: 14px; font-weight: 500; font-family: var(--sans); cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text); transition: background 0.15s, border-color 0.15s; }
  .page-btn:hover { background: #21262d; border-color: var(--accent2); }
  .page-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; cursor: default; }
  .page-btn:disabled { opacity: 0.35; cursor: default; }
  .page-info { color: var(--muted); font-size: 13px; font-family: var(--mono); padding: 0 8px; }

  footer { text-align: center; padding: 24px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<header>
  <div class="logo">📊</div>
  <h1>Diagrams</h1>
  <span>evaggelosevaggelou / diagrams</span>
</header>
<div class="hero">
  <h2>Διαδραστικά Διαγράμματα</h2>
  <p>Όλα τα διαγράμματα για το lovefortechnology.net — ενημερώνεται αυτόματα!</p>
</div>
<div class="grid" id="grid">
  <div class="loading">⏳ Φόρτωση διαγραμμάτων...</div>
</div>
<div class="pagination" id="pagination"></div>
<footer>lovefortechnology.net · GitHub Pages</footer>

<script>
const REPO      = 'evaggelosevaggelou/diagrams';
const BASE      = 'https://evaggelosevaggelou.github.io/diagrams/';
const API       = 'https://api.github.com/repos/' + REPO + '/contents/';
const PER_PAGE  = 9;

const grid       = document.getElementById('grid');
const pagination = document.getElementById('pagination');

let allFiles   = [];
let iframeCodes = [];
let currentPage = 1;

async function load() {
  try {
    const res = await fetch(API);
    const files = await res.json();

    allFiles = files.filter(function(f) {
      return f.type === 'file' && f.name.endsWith('.html') && f.name !== 'index.html';
    });

    // Προ-γεμίζουμε το iframeCodes array για όλα τα files
    allFiles.forEach(function(f, i) {
      var url = BASE + f.name;
      iframeCodes[i] = '<iframe src="' + url + '" width="100%" height="500" frameborder="0" scrolling="no"></iframe>';
    });

    if (allFiles.length === 0) {
      grid.innerHTML = '<div class="empty">Δεν βρέθηκαν διαγράμματα ακόμα.</div>';
      return;
    }

    renderPage(1);

  } catch(e) {
    grid.innerHTML = '<div class="empty">&#10060; Σφάλμα φόρτωσης. Δοκίμασε ξανά.</div>';
  }
}

function renderPage(page) {
  currentPage = page;
  var totalPages = Math.ceil(allFiles.length / PER_PAGE);
  var start = (page - 1) * PER_PAGE;
  var end   = Math.min(start + PER_PAGE, allFiles.length);
  var pageFiles = allFiles.slice(start, end);

  grid.innerHTML = '';

  pageFiles.forEach(function(f, localIdx) {
    var globalIdx = start + localIdx;
    var url   = BASE + f.name;
    var title = f.name.replace('.html', '').replace(/_/g, ' ');

    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<iframe class="preview" src="' + url + '" loading="lazy"></iframe>' +
      '<div class="card-body">' +
        '<div class="card-title">' + title + '</div>' +
        '<div class="card-file">' + f.name + '</div>' +
        '<div class="actions">' +
          '<a class="btn btn-open" href="' + url + '" target="_blank">&#128279; &#913;&#957;&#959;&#953;&#947;&#956;&#945;</a>' +
          '<button class="btn btn-copy" id="copybtn-' + globalIdx + '" onclick="copyIframe(' + globalIdx + ')">&#128203; Copy iframe</button>' +
        '</div>' +
      '</div>';
    grid.appendChild(card);
  });

  renderPagination(page, totalPages);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPagination(page, totalPages) {
  pagination.innerHTML = '';
  if (totalPages <= 1) return;

  // Prev button
  var prev = document.createElement('button');
  prev.className = 'page-btn';
  prev.textContent = '←';
  prev.disabled = (page === 1);
  prev.onclick = function() { renderPage(page - 1); };
  pagination.appendChild(prev);

  // Page numbers with ellipsis
  var pages = getPageNumbers(page, totalPages);
  pages.forEach(function(p) {
    if (p === '...') {
      var dots = document.createElement('span');
      dots.className = 'page-info';
      dots.textContent = '…';
      pagination.appendChild(dots);
    } else {
      var btn = document.createElement('button');
      btn.className = 'page-btn' + (p === page ? ' active' : '');
      btn.textContent = p;
      btn.onclick = (function(pg) { return function() { renderPage(pg); }; })(p);
      pagination.appendChild(btn);
    }
  });

  // Next button
  var next = document.createElement('button');
  next.className = 'page-btn';
  next.textContent = '→';
  next.disabled = (page === totalPages);
  next.onclick = function() { renderPage(page + 1); };
  pagination.appendChild(next);

  // Info text
  var info = document.createElement('span');
  info.className = 'page-info';
  var start = (page - 1) * PER_PAGE + 1;
  var end   = Math.min(page * PER_PAGE, allFiles.length);
  info.textContent = start + '–' + end + ' / ' + allFiles.length;
  pagination.appendChild(info);
}

// Δημιουργεί λίστα σελίδων με ellipsis για μεγάλο αριθμό σελίδων
function getPageNumbers(current, total) {
  if (total <= 7) {
    var arr = [];
    for (var i = 1; i <= total; i++) arr.push(i);
    return arr;
  }
  var pages = [1];
  if (current > 3) pages.push('...');
  for (var i = Math.max(2, current - 1); i <= Math.min(total - 1, current + 1); i++) {
    pages.push(i);
  }
  if (current < total - 2) pages.push('...');
  pages.push(total);
  return pages;
}

function copyIframe(i) {
  var text = iframeCodes[i];
  var btn  = document.getElementById('copybtn-' + i);

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(function() { flash(btn); }).catch(function() { fallback(text, btn); });
  } else {
    fallback(text, btn);
  }
}

function fallback(text, btn) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); flash(btn); }
  catch(e) { alert('Αντέγραψε χειροκίνητα:\n\n' + text); }
  document.body.removeChild(ta);
}

function flash(btn) {
  btn.textContent = '&#10003; Αντιγράφηκε!';
  btn.classList.add('copied');
  setTimeout(function() { btn.textContent = '&#128203; Copy iframe'; btn.classList.remove('copied'); }, 2000);
}

load();
</script>
</body>
</html>
