<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>App Shortcuts — Android Trick #8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;padding:1rem}
@keyframes menu-pop{from{opacity:0;transform:scale(.85) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes shortcut-add{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.lang-controls{display:flex;justify-content:center;gap:8px;margin:0 0 10px}
.lang-controls button{padding:6px 14px;font-size:13px;cursor:pointer;border:1px solid #ccc;border-radius:6px;background:#fff}
.lang-controls button.active{font-weight:700;border-color:#888;background:#f0f0f0}
.action-controls{display:flex;justify-content:center;gap:10px;margin:10px 0 4px;flex-wrap:wrap}
.action-controls button{font-size:13px;padding:6px 18px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer}
.action-controls button:hover{background:#f0f0f0}
</style>
</head>
<body>

<div class="lang-controls">
  <button id="btn-el" class="active" onclick="setLang('el')">Ελληνικά</button>
  <button id="btn-en" onclick="setLang('en')">English</button>
</div>

<svg width="100%" viewBox="0 0 680 500">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- PHONE -->
<rect x="60" y="30" width="200" height="380" rx="24" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="1.5"/>
<rect x="74" y="58" width="172" height="320" rx="10" fill="#1e2030"/>
<rect x="74" y="58" width="172" height="18" rx="10" fill="#111125"/>
<text id="lbl-time" x="160" y="70" text-anchor="middle" font-size="8" fill="#9c9a92">14:32</text>

<!-- Apps -->
<g style="cursor:pointer" onclick="showMenu('messages')">
  <rect id="app-msg-rect" x="90" y="84" width="44" height="44" rx="10" fill="#1D9E75"/>
  <text x="112" y="111" text-anchor="middle" font-size="7" fill="#fff" font-weight="600">MSG</text>
</g>
<g style="cursor:pointer" onclick="showMenu('camera')">
  <rect x="140" y="84" width="44" height="44" rx="10" fill="#444441"/>
  <text x="162" y="111" text-anchor="middle" font-size="7" fill="#fff" font-weight="600">CAM</text>
</g>
<g style="cursor:pointer" onclick="showMenu('gmail')">
  <rect x="190" y="84" width="44" height="44" rx="10" fill="#E24B4A"/>
  <text x="212" y="111" text-anchor="middle" font-size="7" fill="#fff" font-weight="600">MAIL</text>
</g>
<g style="cursor:pointer" onclick="showMenu('calendar')">
  <rect x="90" y="136" width="44" height="44" rx="10" fill="#378ADD"/>
  <text x="112" y="163" text-anchor="middle" font-size="7" fill="#fff" font-weight="600">CAL</text>
</g>
<rect x="140" y="136" width="44" height="44" rx="10" fill="#7F77DD"/>
<rect x="190" y="136" width="44" height="44" rx="10" fill="#BA7517"/>
<rect x="90" y="188" width="44" height="44" rx="10" fill="#333340"/>
<rect x="140" y="188" width="44" height="44" rx="10" fill="#333340"/>
<rect x="190" y="188" width="44" height="44" rx="10" fill="#333340"/>

<!-- Dock -->
<rect x="82" y="246" width="176" height="54" rx="12" fill="#2a2a35"/>
<rect x="90" y="254" width="40" height="40" rx="9" fill="#378ADD"/>
<rect x="136" y="254" width="40" height="40" rx="9" fill="#E24B4A"/>
<rect x="182" y="254" width="40" height="40" rx="9" fill="#1D9E75"/>
<rect x="228" y="254" width="24" height="40" rx="9" fill="#333340"/>

<rect x="130" y="392" width="60" height="3" rx="1.5" fill="#444441"/>
<text id="lbl-longpress" x="160" y="420" text-anchor="middle" font-size="10" fill="#5F5E5A">Πατήστε παρατεταμένα μια εφαρμογή</text>

<!-- Context menu -->
<g id="context-menu" opacity="0">
  <rect x="120" y="90" width="160" height="140" rx="12" fill="#2a2a38" stroke="#5F5E5A" stroke-width="0.5"/>
  <text id="menu-item-1" x="138" y="118" font-size="11" font-weight="600" fill="#E6F1FB">–</text>
  <line x1="128" y1="128" x2="272" y2="128" stroke="#444441" stroke-width="0.5"/>
  <text id="menu-item-2" x="138" y="148" font-size="11" fill="#B5D4F4">–</text>
  <line x1="128" y1="158" x2="272" y2="158" stroke="#444441" stroke-width="0.5"/>
  <text id="menu-item-3" x="138" y="178" font-size="11" fill="#B5D4F4">–</text>
  <line x1="128" y1="188" x2="272" y2="188" stroke="#444441" stroke-width="0.5"/>
  <text id="menu-item-4" x="138" y="208" font-size="11" fill="#9c9a92">Πληροφορίες εφαρμογής</text>
</g>

<!-- Shortcut badge -->
<g id="shortcut-badge" opacity="0" style="cursor:pointer">
  <rect x="90" y="310" width="110" height="36" rx="8" fill="#1D9E75" stroke="#5DCAA5" stroke-width="1"/>
  <text id="shortcut-label" x="145" y="332" text-anchor="middle" font-size="9" font-weight="600" fill="#E1F5EE">Νέο μήνυμα</text>
</g>

<!-- App shortcut cards RIGHT -->
<rect x="310" y="40" width="330" height="96" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<rect x="320" y="50" width="32" height="32" rx="8" fill="#1D9E75"/>
<text x="336" y="71" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">MSG</text>
<text id="app1-name" x="360" y="62" font-size="11" font-weight="600" fill="#085041">Μηνύματα</text>
<text id="app1-s1" x="360" y="78" font-size="10" fill="#0F6E56">→ Νέο μήνυμα</text>
<text id="app1-s2" x="360" y="92" font-size="10" fill="#0F6E56">→ Αναζήτηση</text>
<text id="app1-s3" x="490" y="78" font-size="10" fill="#0F6E56">→ Συχνές επαφές</text>

<rect x="310" y="148" width="330" height="96" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
<rect x="320" y="158" width="32" height="32" rx="8" fill="#444441"/>
<text x="336" y="179" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">CAM</text>
<text id="app2-name" x="360" y="170" font-size="11" font-weight="600" fill="#2C2C2A">Κάμερα</text>
<text id="app2-s1" x="360" y="186" font-size="10" fill="#5F5E5A">→ Selfie</text>
<text id="app2-s2" x="360" y="200" font-size="10" fill="#5F5E5A">→ Video</text>
<text id="app2-s3" x="490" y="186" font-size="10" fill="#5F5E5A">→ Slow motion</text>

<rect x="310" y="256" width="330" height="96" rx="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
<rect x="320" y="266" width="32" height="32" rx="8" fill="#E24B4A"/>
<text x="336" y="287" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">MAIL</text>
<text id="app3-name" x="360" y="278" font-size="11" font-weight="600" fill="#501313">Gmail</text>
<text id="app3-s1" x="360" y="294" font-size="10" fill="#A32D2D">→ Σύνθεση</text>
<text id="app3-s2" x="360" y="308" font-size="10" fill="#A32D2D">→ Αναζήτηση</text>
<text id="app3-s3" x="490" y="294" font-size="10" fill="#A32D2D">→ Εισερχόμενα</text>

<rect x="310" y="364" width="330" height="44" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
<text id="tip-line1" x="320" y="382" font-size="10" font-weight="600" fill="#3C3489">Pro tip:</text>
<text id="tip-line2" x="362" y="382" font-size="10" fill="#534AB7">Σύρετε τη συντόμευση στην αρχική οθόνη</text>
<text id="tip-line3" x="320" y="398" font-size="10" fill="#534AB7">για ακόμα πιο γρήγορη πρόσβαση!</text>

<!-- Steps -->
<rect x="30" y="420" width="620" height="62" rx="10" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text id="step-title" x="340" y="440" text-anchor="middle" font-size="11" font-weight="600" fill="#444441">Πώς να χρησιμοποιήσετε τις συντομεύσεις εφαρμογών</text>
<text id="step1" x="40" y="456" font-size="10" fill="#5F5E5A">1. Πατήστε παρατεταμένα το εικονίδιο οποιασδήποτε εφαρμογής στην αρχική οθόνη</text>
<text id="step2" x="40" y="470" font-size="10" fill="#5F5E5A">2. Εμφανίζεται μενού με γρήγορες ενέργειες — επιλέξτε ή σύρετε στην οθόνη</text>
</svg>

<div class="action-controls">
  <button id="btn-msg" onclick="showMenu('messages')">Πατήστε Μηνύματα!</button>
  <button id="btn-gmail" onclick="showMenu('gmail')">Πατήστε Gmail!</button>
  <button id="btn-drag" onclick="showShortcut()">Σύρετε στην οθόνη!</button>
  <button id="btn-reset" onclick="resetDemo()">Reset</button>
</div>

<script>
var lang='el';
var menus={
  messages:{el:['Νέο μήνυμα','Συχνές επαφές','Αναζήτηση'],en:['New message','Frequent contacts','Search']},
  camera:{el:['Selfie','Video','Slow motion'],en:['Selfie','Video','Slow motion']},
  gmail:{el:['Σύνθεση','Εισερχόμενα','Αναζήτηση'],en:['Compose','Inbox','Search']},
  calendar:{el:['Νέο γεγονός','Σήμερα','Αναζήτηση'],en:['New event','Today','Search']}
};
var tx={
  el:{
    longpress:'Πατήστε παρατεταμένα μια εφαρμογή',
    app1name:'Μηνύματα',app1s1:'→ Νέο μήνυμα',app1s2:'→ Αναζήτηση',app1s3:'→ Συχνές επαφές',
    app2name:'Κάμερα',app2s1:'→ Selfie',app2s2:'→ Video',app2s3:'→ Slow motion',
    app3name:'Gmail',app3s1:'→ Σύνθεση',app3s2:'→ Αναζήτηση',app3s3:'→ Εισερχόμενα',
    tip1:'Pro tip:',tip2:'Σύρετε τη συντόμευση στην αρχική οθόνη',tip3:'για ακόμα πιο γρήγορη πρόσβαση!',
    stepTitle:'Πώς να χρησιμοποιήσετε τις συντομεύσεις εφαρμογών',
    step1:'1. Πατήστε παρατεταμένα το εικονίδιο οποιασδήποτε εφαρμογής στην αρχική οθόνη',
    step2:'2. Εμφανίζεται μενού με γρήγορες ενέργειες — επιλέξτε ή σύρετε στην οθόνη',
    shortcutLabel:'Νέο μήνυμα',appInfo:'Πληροφορίες εφαρμογής',
    btnMsg:'Πατήστε Μηνύματα!',btnGmail:'Πατήστε Gmail!',btnDrag:'Σύρετε στην οθόνη!',btnReset:'Reset'
  },
  en:{
    longpress:'Long-press an app icon',
    app1name:'Messages',app1s1:'→ New message',app1s2:'→ Search',app1s3:'→ Frequent contacts',
    app2name:'Camera',app2s1:'→ Selfie',app2s2:'→ Video',app2s3:'→ Slow motion',
    app3name:'Gmail',app3s1:'→ Compose',app3s2:'→ Search',app3s3:'→ Inbox',
    tip1:'Pro tip:',tip2:'Drag a shortcut to the home screen',tip3:'for even faster access!',
    stepTitle:'How to use app shortcuts',
    step1:'1. Long-press any app icon on the home screen',
    step2:'2. A quick-actions menu appears — tap or drag to the screen',
    shortcutLabel:'New message',appInfo:'App info',
    btnMsg:'Long-press Messages!',btnGmail:'Long-press Gmail!',btnDrag:'Drag to screen!',btnReset:'Reset'
  }
};

function setLang(l){
  lang=l; var t=tx[l];
  document.getElementById('lbl-longpress').textContent=t.longpress;
  document.getElementById('app1-name').textContent=t.app1name;
  document.getElementById('app1-s1').textContent=t.app1s1;
  document.getElementById('app1-s2').textContent=t.app1s2;
  document.getElementById('app1-s3').textContent=t.app1s3;
  document.getElementById('app2-name').textContent=t.app2name;
  document.getElementById('app2-s1').textContent=t.app2s1;
  document.getElementById('app2-s2').textContent=t.app2s2;
  document.getElementById('app2-s3').textContent=t.app2s3;
  document.getElementById('app3-name').textContent=t.app3name;
  document.getElementById('app3-s1').textContent=t.app3s1;
  document.getElementById('app3-s2').textContent=t.app3s2;
  document.getElementById('app3-s3').textContent=t.app3s3;
  document.getElementById('tip-line1').textContent=t.tip1;
  document.getElementById('tip-line2').textContent=t.tip2;
  document.getElementById('tip-line3').textContent=t.tip3;
  document.getElementById('step-title').textContent=t.stepTitle;
  document.getElementById('step1').textContent=t.step1;
  document.getElementById('step2').textContent=t.step2;
  document.getElementById('menu-item-4').textContent=t.appInfo;
  document.getElementById('shortcut-label').textContent=t.shortcutLabel;
  document.getElementById('btn-msg').textContent=t.btnMsg;
  document.getElementById('btn-gmail').textContent=t.btnGmail;
  document.getElementById('btn-drag').textContent=t.btnDrag;
  document.getElementById('btn-reset').textContent=t.btnReset;
  document.getElementById('btn-el').className=(l==='el')?'active':'';
  document.getElementById('btn-en').className=(l==='en')?'active':'';
}

function showMenu(app){
  var items=menus[app]?menus[app][lang]:['–','–','–'];
  document.getElementById('menu-item-1').textContent=items[0]||'–';
  document.getElementById('menu-item-2').textContent=items[1]||'–';
  document.getElementById('menu-item-3').textContent=items[2]||'–';
  var menu=document.getElementById('context-menu');
  menu.setAttribute('opacity','1');
  menu.style.animation='none';
  void menu.offsetWidth;
  menu.style.animation='menu-pop .25s ease forwards';
  document.getElementById('shortcut-badge').setAttribute('opacity','0');
}

function showShortcut(){
  var badge=document.getElementById('shortcut-badge');
  badge.setAttribute('opacity','1');
  badge.style.animation='none';
  void badge.offsetWidth;
  badge.style.animation='shortcut-add .3s ease forwards';
  document.getElementById('context-menu').setAttribute('opacity','0');
}

function resetDemo(){
  document.getElementById('context-menu').setAttribute('opacity','0');
  document.getElementById('shortcut-badge').setAttribute('opacity','0');
}

setLang('el');
</script>
</body>
</html>
